<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Spelling Bee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #d4af37;
  --gold-dim: rgba(212,175,55,0.5);
  --gold-glow: rgba(212,175,55,0.15);
  --bg: #0c0a13;
  --card: rgba(30,26,46,0.97);
  --text: #f0ece2;
  --text-dim: rgba(255,255,255,0.55);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
}
body {
  display: flex; flex-direction: column;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
  background: linear-gradient(170deg, #0c0a13 0%, #1a1528 45%, #110e1c 100%);
}

/* Header */
.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px 6px; flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 9px; }
.header-left span { font-size: 22px; }
.header-left h1 {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 700; letter-spacing: 0.02em;
}
.mode-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 13px; border-radius: 20px;
  border: 1.5px solid rgba(255,255,255,0.18);
  background: transparent; color: var(--text-dim);
  font-size: 12px; font-weight: 500; cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: all 0.25s;
}
.mode-btn.active {
  background: var(--gold-glow); border-color: var(--gold); color: var(--gold);
}
.mode-btn svg { width: 14px; height: 14px; }

/* Card */
.card-area {
  flex: 1; display: flex; flex-direction: column;
  padding: 6px 10px 0; overflow: hidden;
}
.card {
  flex: 1; display: flex; flex-direction: column;
  background: linear-gradient(150deg, rgba(38,32,56,0.97), rgba(22,18,36,0.99));
  border-radius: 22px;
  border: 1px solid rgba(212,175,55,0.1);
  padding: 16px 16px 14px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  transition: transform 0.08s ease;
}
.card::-webkit-scrollbar { display: none; }
.card-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px; flex-shrink: 0;
}
.counter { font-size: 11px; color: rgba(255,255,255,0.3); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
.side-label { font-size: 9px; font-weight: 700; letter-spacing: 0.16em; color: var(--gold-dim); text-transform: uppercase; }
.card-top-right { display: flex; align-items: center; gap: 10px; }
.mark-btn {
  background: none; border: none; cursor: pointer; padding: 2px;
  color: rgba(255,255,255,0.25); transition: all 0.2s;
}
.mark-btn.active { color: var(--gold); }
.mark-btn svg { width: 22px; height: 22px; }

/* Sections */
.sect { display: flex; flex-direction: column; gap: 3px; margin-bottom: 11px; }
.tag {
  font-size: 9px; font-weight: 700; letter-spacing: 0.16em;
  color: var(--gold); text-transform: uppercase; opacity: 0.75; margin-bottom: 1px;
}
.pron-main {
  font-family: 'Playfair Display', serif;
  font-size: 21px; font-weight: 700; letter-spacing: 0.05em;
}
.ipa { font-size: 13px; color: rgba(255,255,255,0.38); font-family: monospace; }
.listen-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 14px; border-radius: 20px;
  border: 1px solid rgba(212,175,55,0.3); background: rgba(212,175,55,0.08);
  color: var(--gold); cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-size: 12.5px; font-weight: 500; margin-top: 5px; align-self: flex-start;
  transition: all 0.2s;
}
.listen-btn:active { background: rgba(212,175,55,0.2); }
.listen-btn svg { width: 15px; height: 15px; }
.pos-chip {
  display: inline-block; padding: 3px 12px; border-radius: 14px;
  background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.22);
  color: var(--gold); font-size: 13px; font-weight: 600; font-style: italic;
}
.def-text { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.85); }
.origin-text { font-size: 13px; line-height: 1.55; color: var(--text-dim); font-style: italic; }
.ex-text {
  font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.65);
  border-left: 3px solid rgba(212,175,55,0.35); padding-left: 12px; font-style: italic;
}

/* Tap hint */
.tap-hint {
  text-align: center; padding: 12px 0 4px;
  font-size: 12px; color: rgba(255,255,255,0.2);
  letter-spacing: 0.04em; flex-shrink: 0;
}

/* Back */
.back-content { display: flex; flex-direction: column; align-items: center; gap: 20px; padding-top: 6px; flex: 1; }
.spelling-box {
  text-align: center; width: 100%; padding: 22px 12px 18px;
  background: linear-gradient(135deg, rgba(212,175,55,0.07), rgba(212,175,55,0.02));
  border-radius: 16px; border: 1px solid rgba(212,175,55,0.15);
}
.spelling-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.22em;
  color: rgba(212,175,55,0.6); text-transform: uppercase; margin-bottom: 10px;
}
.spelling-word {
  font-family: Verdana, Geneva, sans-serif; font-size: 36px; font-weight: 400;
  letter-spacing: 0.04em; line-height: 1.15;
  text-shadow: 0 2px 16px rgba(212,175,55,0.2); margin-bottom: 14px;
}
.letters-row { display: flex; justify-content: center; gap: 3px; flex-wrap: wrap; }
.letter-tile {
  display: inline-flex; align-items: center; justify-content: center;
  width: 27px; height: 34px; border-radius: 6px;
  background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.2);
  color: var(--gold); font-family: 'Playfair Display', serif;
  font-size: 17px; font-weight: 700;
  animation: letterPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
}
.image-box {
  width: 300px; height: 300px; border-radius: 14px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08); position: relative;
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  animation-delay: 0.15s; margin: 0 auto;
}
.word-img { width: 300px; height: 300px; object-fit: cover; display: block; }
.img-caption {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 20px 14px 8px;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7);
  letter-spacing: 0.06em; text-transform: capitalize;
}
.loading-box { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 20px 0; }
.spinner {
  width: 22px; height: 22px;
  border: 2.5px solid rgba(212,175,55,0.2);
  border-top-color: var(--gold); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-text { color: rgba(255,255,255,0.35); font-size: 12px; }

/* Bottom bar */
.bottom-bar {
  flex-shrink: 0;
  padding: 10px 16px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.nav-row {
  display: flex; align-items: center; justify-content: center; gap: 12px;
}
.nav-arrow {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.5); cursor: pointer;
  transition: all 0.2s; flex-shrink: 0;
}
.nav-arrow:active { background: rgba(212,175,55,0.15); border-color: var(--gold); color: var(--gold); transform: scale(0.92); }
.nav-arrow svg { width: 18px; height: 18px; }
.slider-area {
  flex: 1; height: 32px; position: relative;
  display: flex; align-items: center;
  touch-action: none; cursor: pointer;
}
.slider-track-bg {
  width: 100%; height: 3px; border-radius: 2px;
  background: rgba(255,255,255,0.08); position: relative; overflow: hidden;
}
.slider-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--gold), rgba(212,175,55,0.5));
  transition: width 0.15s ease;
}
.slider-dots {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: space-between;
  pointer-events: none; padding: 0 2px;
}
.slider-tick {
  width: 2px; height: 8px; border-radius: 1px;
  background: rgba(255,255,255,0.06); flex-shrink: 0;
}
.slider-tick.major { height: 12px; background: rgba(255,255,255,0.12); }
.slider-tick.active { background: var(--gold); height: 14px; width: 3px; border-radius: 1.5px; box-shadow: 0 0 6px rgba(212,175,55,0.4); }
.slider-thumb {
  position: absolute; top: 50%; transform: translate(-50%, -50%);
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--gold);
  border: 2.5px solid #1a1528;
  box-shadow: 0 0 10px rgba(212,175,55,0.5), 0 2px 6px rgba(0,0,0,0.4);
  cursor: grab; transition: left 0.12s ease;
  z-index: 2;
}
.slider-thumb:active { cursor: grabbing; transform: translate(-50%, -50%) scale(1.15); }
.slider-thumb.dragging { transition: none; transform: translate(-50%, -50%) scale(1.15); }
.slider-counter {
  text-align: center; font-size: 11px; font-weight: 600;
  color: rgba(255,255,255,0.25); letter-spacing: 0.08em;
}

/* Animations */
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes popIn { 0% { transform: scale(0.92); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
@keyframes letterPop { 0% { transform: scale(0) rotate(-8deg); opacity: 0; } 60% { transform: scale(1.1) rotate(2deg); opacity: 1; } 100% { transform: scale(1) rotate(0); opacity: 1; } }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes slideOutL { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-105%); opacity: 0; } }
@keyframes slideOutR { from { transform: translateX(0); opacity: 1; } to { transform: translateX(105%); opacity: 0; } }
.slide-out-l { animation: slideOutL 0.22s ease forwards; }
.slide-out-r { animation: slideOutR 0.22s ease forwards; }
.fade-in { animation: fadeUp 0.3s ease both; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span>ūüźĚ</span>
    <h1><a href="index.html" style="color:inherit;text-decoration:none;">Spelling Bee</a></h1>
  </div>
  <button class="mode-btn" id="modeBtn" onclick="toggleMarkedOnly()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>

    </button>

  <div class="slider-counter" id="sliderCounter">1 / 208</div>
</div>

<script>
const WORDS = [
  { word:'Iceni', pronunciation:'eye-SEE-ny', ipa:'/a…™ňąsiňźna…™/', pos:'noun', def:'An ancient Celtic tribe of eastern Britain whose queen Boudica led a famous revolt against the Roman occupation in 60-61 AD.', lang:'Latin, from Iceni, the Roman name for this British Celtic tribe that inhabited what is now Norfolk and Suffolk.', example:'The Iceni, led by the fierce warrior queen Boudica, burned Roman Colchester, London, and St. Albans to the ground in their legendary revolt.', isNoun:true },
  { word:'ichthyology', pronunciation:'IK-thee-OL-uh-jee', ipa:'/ňĆ…™kőłiňą…íl…ôd íi/', pos:'noun', def:'The branch of zoology devoted to the study of fish.', lang:'Greek, from ichthys (\'a fish\') + -ology (\'study of\'), from logos.', example:'Her passion for ichthyology took her to coral reefs around the world, where she cataloged hundreds of previously unknown fish species.', isNoun:true },
  { word:'icosahedron', pronunciation:'EYE-KOS-uh-HEE-drun', ipa:'/ňĆa…™k…ís…ôňąhiňźdr…ôn/', pos:'noun', def:'A three-dimensional geometric shape with twenty equilateral triangular faces, one of the five Platonic solids.', lang:'Greek, from eikosaedron, from eikosi (\'twenty\') + hedra (\'a seat, face\'), literally \'twenty-faced\'.', example:'The twenty-sided die used in tabletop games is an icosahedron, each triangular face numbered from one to twenty.', isNoun:true },
  { word:'ikebana', pronunciation:'IK-uh-BAH-nuh', ipa:'/ňĆ…™k…™ňąb…Ďňźn…ô/', pos:'noun', def:'The Japanese art of flower arranging, emphasizing form, balance, and the harmony between the arrangement and its container.', lang:'Japanese, from ikebana (\'living flowers\'), from ikeru (\'to keep alive, arrange\') + hana (\'a flower\').', example:'The ikebana arrangement used just three stems ‚ÄĒ a pine branch, a single iris, and a spray of plum blossom ‚ÄĒ to evoke an entire landscape.', isNoun:true },
  { word:'immie', pronunciation:'IM-ee', ipa:'/ňą…™mi/', pos:'noun', def:'A marble made of imitation agate or a marble with a streaked appearance; a type of playing marble popular among children.', lang:'English, short for imitation, because these marbles imitated the appearance of more expensive agate marbles.', example:'The boy\'s prized immie had swirls of blue and white running through the glass, the prettiest marble in his entire collection.', isNoun:true },
  { word:'in medias res', pronunciation:'in MEE-dee-us RAYZ', ipa:'/…™n ňĆmiňźdi…ôs ňąre…™z/', pos:'adverb', def:'Into the middle of things; a narrative technique of beginning a story in the midst of the action rather than at the beginning.', lang:'Latin, from in (\'into\') + medias (\'the middle of\') + res (\'things, affairs\'), from Horace\'s Ars Poetica.', example:'The novel plunges in medias res, opening with the protagonist dangling from a helicopter before flashing back to explain how she got there.', isNoun:false },
  { word:'in nuce', pronunciation:'in NOO-chay', ipa:'/…™n ňąnuňźt Ée…™/', pos:'adverb', def:'In a nutshell; in a condensed or embryonic form; in essence.', lang:'Latin, from in (\'in\') + nuce, ablative of nux (\'a nut\'), literally \'in a nut\'.', example:'The professor presented the entire theory in nuce in his opening paragraph, then spent the rest of the book expanding on every detail.', isNoun:false },
  { word:'in silico', pronunciation:'in SIL-ih-koh', ipa:'/…™n ňąs…™l…™ko ä/', pos:'adverb', def:'Performed on a computer or via computer simulation, as opposed to in vivo (in a living organism) or in vitro (in a test tube).', lang:'Pseudo-Latin, from in (\'in\') + silico (from silicon), modeled on in vivo and in vitro, referring to computer chip-based analysis.', example:'The researchers tested thousands of drug compounds in silico, using computer models to predict which molecules would bind most effectively to the target protein.', isNoun:false },
  { word:'incunabula', pronunciation:'IN-kyoo-NAB-yoo-luh', ipa:'/ňĆ…™nkj äňąn√¶bj äl…ô/', pos:'noun', def:'Books printed before 1501, during the earliest period of European printing; the infancy or early stages of something.', lang:'Latin, from incunabula (\'swaddling clothes, cradle\'), from in (\'in\') + cunabula (\'a cradle\'), describing the infancy of printing.', example:'The library\'s collection of incunabula included a Gutenberg Bible and several other priceless books printed within decades of the invention of movable type.', isNoun:true },
  { word:'inglenook', pronunciation:'ING-gul-nook', ipa:'/ňą…™Ňč…°…ôlňĆn äk/', pos:'noun', def:'A cozy nook or alcove beside a large open fireplace, often with built-in seating.', lang:'Scottish, from ingle (\'a fire, fireplace\', from Gaelic aingeal, \'fire, light\') + nook (\'a corner, recess\').', example:'They curled up in the inglenook with mugs of hot chocolate, the warmth of the crackling fire making the howling storm outside feel a world away.', isNoun:true },
  { word:'insouciance', pronunciation:'in-SOO-see-unce', ipa:'/…™nňąsuňźsi…ôns/', pos:'noun', def:'Casual lack of concern; a lighthearted, carefree attitude; nonchalant indifference.', lang:'French, from insouciance (\'carelessness\'), from in- (\'not\') + soucier (\'to care\'), from Latin sollicitare (\'to disturb\').', example:'She faced the crisis with remarkable insouciance, shrugging off problems that would have sent others into a panic.', isNoun:true },
  { word:'integument', pronunciation:'in-TEG-yoo-munt', ipa:'/…™nňąt…õ…°j äm…ônt/', pos:'noun', def:'A tough outer protective layer or covering of an organism, such as skin, shell, or rind.', lang:'Latin, from integumentum (\'a covering\'), from integere (\'to cover\'), from in- + tegere (\'to cover\').', example:'The beetle\'s hard integument protected it from predators, the glossy exoskeleton serving as both armor and structural support.', isNoun:true },
  { word:'internecine', pronunciation:'IN-tur-NEE-syn', ipa:'/ňĆ…™nt…ôrňąniňźsa…™n/', pos:'adjective', def:'Destructive to both sides in a conflict; of or relating to conflict within a group; mutually destructive.', lang:'Latin, from internecinus (\'murderous, deadly\'), from internecare (\'to slaughter\'), from inter- (\'among\') + necare (\'to kill\').', example:'The internecine struggle within the political party destroyed any hope of winning the election, both factions weakened beyond recovery.', isNoun:false },
  { word:'interregnum', pronunciation:'IN-tur-REG-num', ipa:'/ňĆ…™nt…ôrňąr…õ…°n…ôm/', pos:'noun', def:'A period between two successive reigns or governments when there is no ruler; a pause or gap in a continuous series.', lang:'Latin, from interregnum (\'a period between reigns\'), from inter (\'between\') + regnum (\'a reign, kingdom\').', example:'The interregnum between the old CEO\'s departure and the new one\'s arrival left the company rudderless for three anxious months.', isNoun:true },
  { word:'Inugsuk', pronunciation:'IN-ook-sook', ipa:'/ňą…™n äkňĆsuňźk/', pos:'noun', def:'A variant of inuksuk; a stone landmark or cairn built by Inuit peoples in the Arctic, used for navigation, hunting, and communication.', lang:'Inuktitut, from inuksuk (\'that which acts in the capacity of a human\'), from inuk (\'a person\') + -suk (\'a substitute\').', example:'The Inugsuk stood silhouetted against the Arctic sky, its human-like stone figure guiding travelers across the featureless tundra for centuries.', isNoun:true },
  { word:'Inuk', pronunciation:'IN-ook', ipa:'/ňą…™n äk/', pos:'noun', def:'A single member of the Inuit people; the singular form of Inuit.', lang:'Inuktitut, from inuk (\'a person, human being\'), the self-designation of the indigenous Arctic peoples.', example:'The Inuk elder shared stories of survival on the ice, her knowledge of weather patterns and animal behavior drawn from a lifetime in the Arctic.', isNoun:true },
  { word:'isagoge', pronunciation:'EYE-suh-GOH-jee', ipa:'/ňĆa…™s…ôňą…°o äd íi/', pos:'noun', def:'An introduction or introductory study, especially to a branch of theology or philosophy.', lang:'Greek, from eisagoge (\'an introduction, a leading in\'), from eisagein (\'to lead in\'), from eis (\'into\') + agein (\'to lead\').', example:'The professor began the course with an isagoge to biblical criticism, orienting students in the methods they would use throughout the semester.', isNoun:true },
  { word:'Ishihara test', pronunciation:'ISH-ih-HAR-uh TEST', ipa:'/ňĆ…™ É…™ňąh…Ďňźr…ô ňĆt…õst/', pos:'noun', def:'A color vision test using plates of colored dots with numbers or patterns visible only to those with normal color perception.', lang:'Named after Shinobu Ishihara (1879-1963), the Japanese ophthalmologist who devised the test in 1917.', example:'The Ishihara test revealed he was red-green colorblind, the numbers hidden in the dotted plates invisible to his eyes.', isNoun:true },
  { word:'ivermectin', pronunciation:'EYE-vur-MEK-tin', ipa:'/ňĆa…™v…ôrňąm…õkt…™n/', pos:'noun', def:'An antiparasitic medication used to treat infections caused by roundworms, lice, and mites in humans and animals.', lang:'English, from Streptomyces avermitilis (the soil bacterium from which it was derived), with modification of avermectin to ivermectin.', example:'The veterinarian administered ivermectin to treat the horse\'s parasitic infection, the antiparasitic medication effective against a wide range of worms.', isNoun:true }
];

let currentIndex = 0, flipped = false, markedWords = new Set(), markedOnly = false;
let imageCache = {};
let imageLoading = {};
let touchStartX = 0, swipeX = 0;

const wikiImageMap = {
  'Iceni': 'Iceni',
  'ichthyology': 'Ichthyology',
  'icosahedron': 'Icosahedron',
  'ikebana': 'Ikebana',
  'immie': 'Marble_(toy)',
  'incunabula': 'Incunabulum',
  'inglenook': 'Inglenook',
  'insouciance': 'Insouciance',
  'integument': 'Integument',
  'interregnum': 'Interregnum',
  'Inugsuk': 'Inuksuk',
  'Inuk': 'Inuit',
  'isagoge': 'Isagoge',
  'Ishihara test': 'Ishihara_test',
  'ivermectin': 'Ivermectin'
};

async function loadImages() {
  for (const [word, article] of Object.entries(wikiImageMap)) {
    try {
      const resp = await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(article));
      if (resp.ok) {
        const data = await resp.json();
        if (data.thumbnail && data.thumbnail.source) {
          let url = data.thumbnail.source;
          url = url.replace(/\/\d+px-/, '/400px-');
          imageCache[word] = url;
          const imgEl = document.getElementById('img-' + word);
          if (imgEl) {
            imgEl.innerHTML = '<div class="image-box"><img class="word-img" src="' + url + '" alt="' + word + '" onerror="this.parentElement.style.display=\'none\'"><div class="img-caption">' + word + '</div></div>';
          }
        }
      }
    } catch(e) {}
  }
}

loadImages();

function aw() { return markedOnly ? WORDS.filter((_,i) => markedWords.has(i)) : WORDS; }
function si() { const a=aw(); if(markedOnly){const i=a.findIndex(w=>w.word===WORDS[currentIndex]?.word);return i>=0?i:0;} return currentIndex; }
function gi() { const a=aw(),s=si(); return WORDS.findIndex(w=>w.word===a[s]?.word); }

function speak(t) { speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.rate=0.85;u.pitch=1;u.lang="en-US"; speechSynthesis.speak(u); }

const starSvg=f=>`<svg viewBox="0 0 24 24" fill="${f?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
const speakerSvg=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;

function renderFront(w) {
  return `
    <div class="sect fade-in"><div class="tag">PRONUNCIATION</div><div class="pron-main">${w.pronunciation}</div><div class="ipa">${w.ipa}</div>
      <button class="listen-btn" onclick="event.stopPropagation();speak('${w.word}')">${speakerSvg}<span>Listen</span></button></div>
    <div class="sect fade-in" style="animation-delay:.06s"><div class="tag">PART OF SPEECH</div><span class="pos-chip">${w.pos}</span></div>
    <div class="sect fade-in" style="animation-delay:.12s"><div class="tag">DEFINITION</div><div class="def-text">${w.def}</div></div>
    <div class="sect fade-in" style="animation-delay:.18s"><div class="tag">LANGUAGE OF ORIGIN</div><div class="origin-text">${w.lang}</div></div>
    <div class="sect fade-in" style="animation-delay:.24s"><div class="tag">EXAMPLE</div><div class="ex-text">"${w.example.replace(new RegExp(w.word,'gi'),'________')}"</div></div>
    <div class="tap-hint fade-in" style="animation-delay:.3s">Tap card to reveal spelling</div>`;
}

function renderBack(w) {
  const letters=w.word.split("").map((c,i)=>`<span class="letter-tile" style="animation-delay:${i*0.04+0.12}s">${c}</span>`).join("");
  let img="";
  if(w.isNoun){
    let imgContent = "";
    if(imageCache[w.word]) imgContent=`<div class="image-box"><img class="word-img" src="${imageCache[w.word]}" alt="${w.word}" onerror="this.parentElement.style.display='none'"><div class="img-caption">${w.word}</div></div>`;
    else if(wikiImageMap[w.word]) imgContent=`<div class="loading-box"><div class="spinner"></div><span class="loading-text">Loading image‚Ä¶</span></div>`;
    img=`<div id="img-${w.word}">${imgContent}</div>`;
  }
  return `<div class="back-content">
    <div class="spelling-box" style="animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both">
      <div class="spelling-label">THE WORD IS</div><h2 class="spelling-word">${w.word}</h2>
      <div class="letters-row">${letters}</div>
      <button class="listen-btn" style="margin:14px auto 0" onclick="event.stopPropagation();speak('${w.word}')">${speakerSvg}<span>Hear Again</span></button>
    </div>${img}
    <div class="tap-hint">Tap card to go back to clues</div></div>`;
}

function render() {
  const a=aw();
  if(!a.length){ document.getElementById("card").innerHTML=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px"><p style="color:rgba(255,255,255,0.5);font-size:16px">No marked words yet.</p><button class="flip-btn" style="width:auto;padding:10px 24px" onclick="markedOnly=false;render()">‚Üź Show All</button></div>`; return; }
  const s=si(), g=gi(), w=a[s];

  document.getElementById("card").innerHTML=`<div class="card-top"><span class="counter">${s+1} / ${a.length}</span><div class="card-top-right"><span class="side-label">${flipped?'ANSWER':'CLUES'}</span><button class="mark-btn ${markedWords.has(g)?'active':''}" onclick="toggleMark(${g})">${starSvg(markedWords.has(g))}</button></div></div>`+(flipped?renderBack(w):renderFront(w));

  // Images loaded in background via loadImages()

  // Slider
  const totalA = a.length;
  const pct = totalA > 1 ? s / (totalA - 1) * 100 : 0;
  document.getElementById("sliderFill").style.width = pct + "%";
  const sliderArea = document.getElementById("sliderArea");
  const areaW = sliderArea.offsetWidth || 200;
  const pad = 10;
  const thumbLeft = pad + (pct / 100) * (areaW - pad * 2);
  const thumb = document.getElementById("sliderThumb");
  if(!thumb.classList.contains('dragging')) thumb.style.left = thumbLeft + "px";

  // Ticks - show ~20 evenly spaced markers
  const tickCount = Math.min(totalA, 20);
  let ticksHtml = '';
  for(let t=0; t<tickCount; t++){
    const ti = Math.round(t / (tickCount-1) * (totalA-1));
    const cls = ti===s ? 'active' : (t % 5 === 0 ? 'major' : '');
    ticksHtml += `<div class="slider-tick ${cls}"></div>`;
  }
  document.getElementById("sliderDots").innerHTML = ticksHtml;
  document.getElementById("sliderCounter").textContent = `${s+1} / ${totalA}`;

  // Mode btn
  const mb=document.getElementById("modeBtn");
  mb.className="mode-btn"+(markedOnly?" active":"");
  mb.querySelector("svg").setAttribute("fill",markedOnly?"currentColor":"none");
  document.getElementById("modeBtnText").textContent=(markedOnly?"Marked":"All")+` (${markedOnly?markedWords.size:WORDS.length})`;
}

function jumpTo(idx) {
  const a=aw(); if(idx<0||idx>=a.length) return;
  const g=WORDS.findIndex(w=>w.word===a[idx].word);
  flipped=false; currentIndex=g; render();
  setTimeout(()=>speak(a[idx].word),200);
}

function navigateTo(dir) {
  const a=aw(); if(!a.length) return;
  const s=si(), card=document.getElementById("card");
  card.classList.add(dir==="left"?"slide-out-l":"slide-out-r");
  flipped=false;
  setTimeout(()=>{
    card.classList.remove("slide-out-l","slide-out-r");
    const ni=dir==="left"?(s+1)%a.length:(s-1+a.length)%a.length;
    currentIndex=WORDS.findIndex(w=>w.word===a[ni].word);
    render(); setTimeout(()=>speak(a[ni].word),150);
  },220);
}

function flipCard(){flipped=!flipped;render();}
function toggleMark(g){markedWords.has(g)?markedWords.delete(g):markedWords.add(g);render();}
function toggleMarkedOnly(){if(!markedOnly&&markedWords.size===0)return;markedOnly=!markedOnly;flipped=false;render();}

// Swipe
const ca=document.getElementById("cardArea");
let swiped=false;
ca.addEventListener("touchstart",e=>{touchStartX=e.touches[0].clientX;swiped=false;},{passive:true});
ca.addEventListener("touchmove",e=>{swipeX=e.touches[0].clientX-touchStartX;if(Math.abs(swipeX)>15)swiped=true;},{passive:true});
ca.addEventListener("touchend",()=>{if(Math.abs(swipeX)>50)navigateTo(swipeX<0?"left":"right");swipeX=0;});

// Card tap to flip
const card=document.getElementById("card");
card.addEventListener("click",e=>{
  if(e.target.closest('button')||swiped) return;
  flipCard();
});

// Slider drag
const slArea=document.getElementById("sliderArea");
const slThumb=document.getElementById("sliderThumb");
let slDragging=false;
function sliderFromX(cx){
  const r=slArea.getBoundingClientRect();
  const pad=10;
  const p=Math.max(0,Math.min(1,(cx-r.left-pad)/(r.width-pad*2)));
  const a=aw(),idx=Math.round(p*(a.length-1));
  // Move thumb immediately for smooth feel
  const thumbLeft=pad+(p)*(r.width-pad*2);
  slThumb.style.left=thumbLeft+"px";
  if(idx!==si()){
    const g=WORDS.findIndex(w=>w.word===a[idx].word);
    flipped=false; currentIndex=g; render();
  }
}
slArea.addEventListener("touchstart",e=>{
  slDragging=true; slThumb.classList.add('dragging');
  sliderFromX(e.touches[0].clientX);
},{passive:true});
document.addEventListener("touchmove",e=>{
  if(slDragging) sliderFromX(e.touches[0].clientX);
},{passive:true});
document.addEventListener("touchend",()=>{
  if(slDragging){
    slDragging=false; slThumb.classList.remove('dragging');
    // Speak the word after releasing
    const a=aw(),s=si();
    if(a[s]) setTimeout(()=>speak(a[s].word),100);
  }
});
slArea.addEventListener("mousedown",e=>{
  slDragging=true; slThumb.classList.add('dragging');
  sliderFromX(e.clientX); e.preventDefault();
});
document.addEventListener("mousemove",e=>{
  if(slDragging) sliderFromX(e.clientX);
});
document.addEventListener("mouseup",()=>{
  if(slDragging){
    slDragging=false; slThumb.classList.remove('dragging');
    const a=aw(),s=si();
    if(a[s]) setTimeout(()=>speak(a[s].word),100);
  }
});

// Keyboard
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight")navigateTo("left");
  else if(e.key==="ArrowLeft")navigateTo("right");
  else if(e.key===" "){e.preventDefault();flipCard();}
});

render();
setTimeout(()=>speak(WORDS[0].word),500);
</script>
</body>
</html>
