<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Spelling Bee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #d4af37;
  --gold-dim: rgba(212,175,55,0.5);
  --gold-glow: rgba(212,175,55,0.15);
  --bg: #0c0a13;
  --card: rgba(30,26,46,0.97);
  --text: #f0ece2;
  --text-dim: rgba(255,255,255,0.55);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
}
body {
  display: flex; flex-direction: column;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
  background: linear-gradient(170deg, #0c0a13 0%, #1a1528 45%, #110e1c 100%);
}

/* Header */
.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px 6px; flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 9px; }
.header-left span { font-size: 22px; }
.header-left h1 {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 700; letter-spacing: 0.02em;
}
.mode-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 13px; border-radius: 20px;
  border: 1.5px solid rgba(255,255,255,0.18);
  background: transparent; color: var(--text-dim);
  font-size: 12px; font-weight: 500; cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: all 0.25s;
}
.mode-btn.active {
  background: var(--gold-glow); border-color: var(--gold); color: var(--gold);
}
.mode-btn svg { width: 14px; height: 14px; }

/* Card */
.card-area {
  flex: 1; display: flex; flex-direction: column;
  padding: 6px 10px 0; overflow: hidden;
}
.card {
  flex: 1; display: flex; flex-direction: column;
  background: linear-gradient(150deg, rgba(38,32,56,0.97), rgba(22,18,36,0.99));
  border-radius: 22px;
  border: 1px solid rgba(212,175,55,0.1);
  padding: 16px 16px 14px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  transition: transform 0.08s ease;
}
.card::-webkit-scrollbar { display: none; }
.card-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px; flex-shrink: 0;
}
.counter { font-size: 11px; color: rgba(255,255,255,0.3); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
.side-label { font-size: 9px; font-weight: 700; letter-spacing: 0.16em; color: var(--gold-dim); text-transform: uppercase; }
.card-top-right { display: flex; align-items: center; gap: 10px; }
.mark-btn {
  background: none; border: none; cursor: pointer; padding: 2px;
  color: rgba(255,255,255,0.25); transition: all 0.2s;
}
.mark-btn.active { color: var(--gold); }
.mark-btn svg { width: 22px; height: 22px; }

/* Sections */
.sect { display: flex; flex-direction: column; gap: 3px; margin-bottom: 11px; }
.tag {
  font-size: 9px; font-weight: 700; letter-spacing: 0.16em;
  color: var(--gold); text-transform: uppercase; opacity: 0.75; margin-bottom: 1px;
}
.pron-main {
  font-family: 'Playfair Display', serif;
  font-size: 21px; font-weight: 700; letter-spacing: 0.05em;
}
.ipa { font-size: 13px; color: rgba(255,255,255,0.38); font-family: monospace; }
.listen-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 14px; border-radius: 20px;
  border: 1px solid rgba(212,175,55,0.3); background: rgba(212,175,55,0.08);
  color: var(--gold); cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-size: 12.5px; font-weight: 500; margin-top: 5px; align-self: flex-start;
  transition: all 0.2s;
}
.listen-btn:active { background: rgba(212,175,55,0.2); }
.listen-btn svg { width: 15px; height: 15px; }
.pos-chip {
  display: inline-block; padding: 3px 12px; border-radius: 14px;
  background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.22);
  color: var(--gold); font-size: 13px; font-weight: 600; font-style: italic;
}
.def-text { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.85); }
.origin-text { font-size: 13px; line-height: 1.55; color: var(--text-dim); font-style: italic; }
.ex-text {
  font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.65);
  border-left: 3px solid rgba(212,175,55,0.35); padding-left: 12px; font-style: italic;
}

/* Tap hint */
.tap-hint {
  text-align: center; padding: 12px 0 4px;
  font-size: 12px; color: rgba(255,255,255,0.2);
  letter-spacing: 0.04em; flex-shrink: 0;
}

/* Back */
.back-content { display: flex; flex-direction: column; align-items: center; gap: 20px; padding-top: 6px; flex: 1; }
.spelling-box {
  text-align: center; width: 100%; padding: 22px 12px 18px;
  background: linear-gradient(135deg, rgba(212,175,55,0.07), rgba(212,175,55,0.02));
  border-radius: 16px; border: 1px solid rgba(212,175,55,0.15);
}
.spelling-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.22em;
  color: rgba(212,175,55,0.6); text-transform: uppercase; margin-bottom: 10px;
}
.spelling-word {
  font-family: Verdana, Geneva, sans-serif; font-size: 36px; font-weight: 400;
  letter-spacing: 0.04em; line-height: 1.15;
  text-shadow: 0 2px 16px rgba(212,175,55,0.2); margin-bottom: 14px;
}
.letters-row { display: flex; justify-content: center; gap: 3px; flex-wrap: wrap; }
.letter-tile {
  display: inline-flex; align-items: center; justify-content: center;
  width: 27px; height: 34px; border-radius: 6px;
  background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.2);
  color: var(--gold); font-family: 'Playfair Display', serif;
  font-size: 17px; font-weight: 700;
  animation: letterPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
}
.image-box {
  width: 300px; height: 300px; border-radius: 14px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08); position: relative;
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  animation-delay: 0.15s; margin: 0 auto;
}
.word-img { width: 300px; height: 300px; object-fit: cover; display: block; }
.img-caption {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 20px 14px 8px;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7);
  letter-spacing: 0.06em; text-transform: capitalize;
}
.loading-box { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 20px 0; }
.spinner {
  width: 22px; height: 22px;
  border: 2.5px solid rgba(212,175,55,0.2);
  border-top-color: var(--gold); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-text { color: rgba(255,255,255,0.35); font-size: 12px; }

/* Bottom bar */
.bottom-bar {
  flex-shrink: 0;
  padding: 10px 16px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.nav-row {
  display: flex; align-items: center; justify-content: center; gap: 12px;
}
.nav-arrow {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.5); cursor: pointer;
  transition: all 0.2s; flex-shrink: 0;
}
.nav-arrow:active { background: rgba(212,175,55,0.15); border-color: var(--gold); color: var(--gold); transform: scale(0.92); }
.nav-arrow svg { width: 18px; height: 18px; }
.slider-area {
  flex: 1; height: 32px; position: relative;
  display: flex; align-items: center;
  touch-action: none; cursor: pointer;
}
.slider-track-bg {
  width: 100%; height: 3px; border-radius: 2px;
  background: rgba(255,255,255,0.08); position: relative; overflow: hidden;
}
.slider-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--gold), rgba(212,175,55,0.5));
  transition: width 0.15s ease;
}
.slider-dots {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: space-between;
  pointer-events: none; padding: 0 2px;
}
.slider-tick {
  width: 2px; height: 8px; border-radius: 1px;
  background: rgba(255,255,255,0.06); flex-shrink: 0;
}
.slider-tick.major { height: 12px; background: rgba(255,255,255,0.12); }
.slider-tick.active { background: var(--gold); height: 14px; width: 3px; border-radius: 1.5px; box-shadow: 0 0 6px rgba(212,175,55,0.4); }
.slider-thumb {
  position: absolute; top: 50%; transform: translate(-50%, -50%);
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--gold);
  border: 2.5px solid #1a1528;
  box-shadow: 0 0 10px rgba(212,175,55,0.5), 0 2px 6px rgba(0,0,0,0.4);
  cursor: grab; transition: left 0.12s ease;
  z-index: 2;
}
.slider-thumb:active { cursor: grabbing; transform: translate(-50%, -50%) scale(1.15); }
.slider-thumb.dragging { transition: none; transform: translate(-50%, -50%) scale(1.15); }
.slider-counter {
  text-align: center; font-size: 11px; font-weight: 600;
  color: rgba(255,255,255,0.25); letter-spacing: 0.08em;
}

/* Animations */
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes popIn { 0% { transform: scale(0.92); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
@keyframes letterPop { 0% { transform: scale(0) rotate(-8deg); opacity: 0; } 60% { transform: scale(1.1) rotate(2deg); opacity: 1; } 100% { transform: scale(1) rotate(0); opacity: 1; } }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes slideOutL { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-105%); opacity: 0; } }
@keyframes slideOutR { from { transform: translateX(0); opacity: 1; } to { transform: translateX(105%); opacity: 0; } }
.slide-out-l { animation: slideOutL 0.22s ease forwards; }
.slide-out-r { animation: slideOutR 0.22s ease forwards; }
.fade-in { animation: fadeUp 0.3s ease both; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span>🐝</span>
    <h1><a href="index.html" style="color:inherit;text-decoration:none;">Spelling Bee</a></h1>
  </div>
  <button class="mode-btn" id="modeBtn" onclick="toggleMarkedOnly()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span id="modeBtnText">All (6)</span>
  </button>
</div>

<div class="card-area" id="cardArea">
  <div class="card" id="card"></div>
</div>

<div class="bottom-bar">
  <div class="nav-row">
    <button class="nav-arrow" id="prevBtn" onclick="navigateTo('right')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="slider-area" id="sliderArea">
      <div class="slider-track-bg">
        <div class="slider-fill" id="sliderFill"></div>
      </div>
      <div class="slider-dots" id="sliderDots"></div>
      <div class="slider-thumb" id="sliderThumb"></div>
    </div>
    <button class="nav-arrow" id="nextBtn" onclick="navigateTo('left')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
  </div>
  <div class="slider-counter" id="sliderCounter">1 / 208</div>
</div>

<script>
const WORDS = [
  { word:'haikai', pronunciation:'HY-ky', ipa:'/ˈhaɪkaɪ/', pos:'noun', def:'A form of collaborative linked-verse poetry in Japanese literature from which haiku evolved; comic or informal renga.', lang:'Japanese, from haikai (\'comic, playful\'), short for haikai no renga (\'playful linked verse\'), a lighter form of the classical renga tradition.', example:'The poets gathered to compose haikai, each contributor adding a verse that linked playfully to the one before in an evening of collaborative art.', isNoun:true },
  { word:'halala', pronunciation:'hah-LAH-lah', ipa:'/hɑːˈlɑːlə/', pos:'noun', def:'A monetary unit of Saudi Arabia equal to one hundredth of a riyal.', lang:'Arabic, from halala, a subdivision of the Saudi riyal currency.', example:'The merchant counted out the change in halalas, the small coins clinking on the counter as he made change for the customer.', isNoun:true },
  { word:'halalah', pronunciation:'hah-LAH-lah', ipa:'/hɑːˈlɑːlə/', pos:'noun', def:'A variant spelling of halala; a monetary unit of Saudi Arabia.', lang:'Arabic, variant transliteration of halala, the fractional currency of Saudi Arabia.', example:'The price was quoted in riyals and halalahs, the smallest denomination still in common use in the kingdom.', isNoun:true },
  { word:'halcyon', pronunciation:'HAL-see-un', ipa:'/ˈhælsiən/', pos:'adjective', def:'Denoting a period of time in the past that was idyllically happy and peaceful; calm and tranquil.', lang:'Greek, from alkyon (\'a kingfisher\'), the mythical bird that calmed the seas during the winter solstice to nest on the waves.', example:'She remembered the halcyon days of childhood summers at the lake, when time seemed endless and every day was golden.', isNoun:false },
  { word:'Hamtramck', pronunciation:'ham-TRAM-ik', ipa:'/hæmˈtræmɪk/', pos:'noun', def:'A city entirely surrounded by Detroit, Michigan, known for its diverse immigrant communities and independent civic identity.', lang:'Named after Colonel Jean François Hamtramck (1756-1803), a French-Canadian officer who served in the American Revolutionary War.', example:'Hamtramck\'s unique position as a city within a city gives it a distinct identity, its streets filled with Polish bakeries and Yemeni restaurants side by side.', isNoun:true },
  { word:'hangul', pronunciation:'HAHN-gool', ipa:'/ˈhɑːnɡuːl/', pos:'noun', def:'The Korean alphabet, created by King Sejong the Great in 1443, praised for its logical, scientific design based on the shapes of speech organs.', lang:'Korean, from han (\'great\') + gul (\'script\'), the writing system designed to promote literacy among common people.', example:'King Sejong created hangul so that ordinary Koreans could read and write, the alphabet\'s brilliant simplicity making it one of the most logical writing systems ever devised.', isNoun:true },
  { word:'hapalonychia', pronunciation:'HAP-uh-loh-NIK-ee-uh', ipa:'/ˌhæpəloʊˈnɪkiə/', pos:'noun', def:'A condition in which the fingernails or toenails are abnormally soft and thin, bending easily.', lang:'Greek, from hapalos (\'soft, tender\') + onyx (genitive onychos, \'a nail, claw\').', example:'The dermatologist diagnosed hapalonychia, noting that the patient\'s unusually soft, flexible nails bent like paper at the slightest pressure.', isNoun:true },
  { word:'haupia', pronunciation:'how-PEE-uh', ipa:'/haʊˈpiːə/', pos:'noun', def:'A traditional Hawaiian coconut pudding with a firm, gelatin-like texture, made from coconut milk and starch.', lang:'Hawaiian, from haupia, the traditional coconut dessert served at luaus and celebrations throughout the Hawaiian Islands.', example:'The haupia was cut into squares and served on ti leaves at the luau, the creamy coconut pudding a cool, sweet finish to the feast.', isNoun:true },
  { word:'hebdomadal', pronunciation:'heb-DOM-uh-dul', ipa:'/hɛbˈdɒmədəl/', pos:'adjective', def:'Occurring every week; weekly; of or relating to a period of seven days.', lang:'Latin, from hebdomadalis (\'weekly\'), from Greek hebdomas (genitive hebdomados, \'a group of seven, a week\'), from hepta (\'seven\').', example:'The hebdomadal council met every Monday morning without fail, the weekly gathering a fixture of university governance for over three centuries.', isNoun:false },
  { word:'heiau', pronunciation:'HAY-ow', ipa:'/ˈheɪaʊ/', pos:'noun', def:'An ancient Hawaiian temple or sacred platform, built of stone and used for worship, sacrifice, and ceremonies.', lang:'Hawaiian, from heiau (\'a temple\'), the stone platform temples that served as centers of Hawaiian religious life.', example:'The moss-covered heiau stood on a bluff overlooking the Pacific, its massive stone walls testament to the engineering skill of ancient Hawaiian priests.', isNoun:true },
  { word:'hei-tiki', pronunciation:'HAY-TIK-ee', ipa:'/ˌheɪˈtɪki/', pos:'noun', def:'A carved pendant in the form of a human figure, traditionally made of greenstone (pounamu) and worn by Māori as a treasured ornament.', lang:'Māori, from hei (\'to hang around the neck\') + tiki (\'a carved human figure\'), the sacred jade pendants passed down as family heirlooms.', example:'The hei-tiki carved from translucent greenstone had been passed down through six generations, each wearer adding to its spiritual power and prestige.', isNoun:true },
  { word:'hellebore', pronunciation:'HEL-uh-bor', ipa:'/ˈhɛləˌbɔːr/', pos:'noun', def:'A poisonous evergreen plant with large, cup-shaped flowers that bloom in late winter, valued in gardens for its early flowering.', lang:'Greek, from helleboros, possibly from helein (\'to injure\') + bora (\'food\'), because the plant is toxic if ingested.', example:'The hellebores pushed through the February snow, their nodding white and purple flowers a welcome promise that spring would eventually arrive.', isNoun:true },
  { word:'hemorrhage', pronunciation:'HEM-ur-ij', ipa:'/ˈhɛmərɪdʒ/', pos:'noun', def:'An escape of blood from a ruptured blood vessel; severe or uncontrolled bleeding.', lang:'Greek, from haimorrhagia (\'a violent bleeding\'), from haima (\'blood\') + rhegnynai (\'to burst\').', example:'The surgeon worked quickly to stop the hemorrhage, clamping the ruptured vessel before the patient lost a dangerous amount of blood.', isNoun:true },
  { word:'hennin', pronunciation:'HEN-in', ipa:'/ˈhɛnɪn/', pos:'noun', def:'A tall, cone-shaped headdress worn by European noblewomen in the 15th century, often draped with a sheer veil.', lang:'French, from hennin, of uncertain origin, possibly from Old French henin (\'bothersome\'), the iconic pointed hat of medieval aristocratic women.', example:'The noblewoman\'s hennin towered two feet above her head, its pointed tip trailing a gossamer veil that floated behind her like a banner.', isNoun:true },
  { word:'henotheism', pronunciation:'HEN-oh-THEE-iz-um', ipa:'/ˈhɛnoʊˌθiːɪzəm/', pos:'noun', def:'The worship of one god without denying the existence of other gods; devotion to a single deity while acknowledging many.', lang:'Greek, from henos (genitive of heis, \'one\') + theos (\'god\') + -ism, coined by Max Müller to describe ancient religious practices.', example:'Many scholars describe early Vedic religion as henotheistic, with worshippers devoted to one god at a time while recognizing the reality of others.', isNoun:true },

  { word:'Herodotean', pronunciation:'heh-ROD-uh-TEE-un', ipa:'/hɛˌrɒdəˈtiːən/', pos:'adjective', def:'Of or relating to Herodotus, the ancient Greek historian known as the Father of History, or his style of discursive, anecdotal narrative.', lang:'Named after Herodotus (c. 484-425 BC), the Greek historian whose Histories combined factual reporting with colorful digressions, + -ean.', example:'The journalist\'s Herodotean style blended factual reporting with vivid personal stories, the digressions as fascinating as the main narrative.', isNoun:false },

  { word:'hirsute', pronunciation:'HUR-soot', ipa:'/ˈhɜːrsuːt/', pos:'adjective', def:'Having a lot of hair on the body or face; hairy; covered with stiff hairs or bristles.', lang:'Latin, from hirsutus (\'rough, shaggy, bristly\'), from hirtus (\'hairy\').', example:'The hirsute man\'s thick beard and bushy eyebrows gave him the look of a mountain hermit, though he was actually a mild-mannered accountant.', isNoun:false },
  { word:'hoi polloi', pronunciation:'HOY puh-LOY', ipa:'/ˌhɔɪ pəˈlɔɪ/', pos:'noun', def:'The masses; the common people; ordinary folk, often used with mild condescension.', lang:'Greek, from hoi polloi (\'the many\'), from hoi (\'the\', plural) + polloi (\'many\').', example:'The exclusive club was designed to keep the hoi polloi at bay, its steep membership fees ensuring only the wealthy could pass through its doors.', isNoun:true },
  { word:'holobenthic', pronunciation:'HOL-oh-BEN-thik', ipa:'/ˌhɒloʊˈbɛnθɪk/', pos:'adjective', def:'Of an organism, spending its entire life cycle on or near the bottom of a body of water.', lang:'Greek, from holos (\'whole, entire\') + benthos (\'the depth of the sea\'), + -ic.', example:'The holobenthic clam spends its entire life buried in the seafloor sediment, never venturing into the open water above.', isNoun:false },
  { word:'hominin', pronunciation:'HOM-ih-nin', ipa:'/ˈhɒmɪnɪn/', pos:'noun', def:'A member of the group that includes modern humans and our direct ancestors after the split from the lineage leading to chimpanzees.', lang:'Latin, from homo (genitive hominis, \'a human being\') + -in, the taxonomic tribe Hominini encompassing humans and their extinct relatives.', example:'The fossil hominin discovered in the Ethiopian desert pushed the timeline of bipedal walking back by nearly a million years.', isNoun:true },
  { word:'homoscedasticity', pronunciation:'HOH-moh-skeh-das-TIS-ih-tee', ipa:'/ˌhoʊmoʊskɛdæsˈtɪsɪti/', pos:'noun', def:'The property of a set of random variables having the same variance; a key assumption in regression analysis.', lang:'Greek, from homos (\'same\') + skedasis (\'a scattering\'), + -ity, describing equal dispersion of data points.', example:'The statistician tested for homoscedasticity before running the regression, ensuring the variance of residuals remained constant across all levels.', isNoun:true },
  { word:'hordeolum', pronunciation:'hor-DEE-oh-lum', ipa:'/hɔːrˈdiːoʊləm/', pos:'noun', def:'A stye; an acute infection of a gland at the edge of the eyelid, causing a painful, red, swollen bump.', lang:'Latin, from hordeolum (\'a small barley corn\'), diminutive of hordeum (\'barley\'), because a stye resembles a barley grain.', example:'The ophthalmologist diagnosed the painful red bump on her eyelid as a hordeolum and prescribed warm compresses to help it drain.', isNoun:true },
  { word:'houppelande', pronunciation:'OOP-lond', ipa:'/ˈuːplɒnd/', pos:'noun', def:'A voluminous outer garment with wide sleeves, worn by both men and women in medieval Europe from the 14th to 16th centuries.', lang:'French, from houppelande (\'a long, full cloak\'), of uncertain origin, possibly from a Germanic word for a cloak or mantle.', example:'The nobleman\'s houppelande swept the ground as he walked, its enormous dagged sleeves trailing behind him in a cascade of embroidered velvet.', isNoun:true },
  { word:'Hsia', pronunciation:'SHEE-ah', ipa:'/ʃiːɑː/', pos:'noun', def:'The Xia dynasty, traditionally the first dynasty in Chinese history, believed to have ruled from about 2070 to 1600 BC.', lang:'Chinese, from Xia (Wade-Giles: Hsia), the legendary first Chinese dynasty, possibly from a word meaning \'great\' or \'magnificent\'.', example:'The Hsia dynasty remains partly shrouded in legend, with historians debating whether its tales of sage-kings reflect historical rulers or mythological ideals.', isNoun:true },
  { word:'Huallaga', pronunciation:'wah-YAH-gah', ipa:'/wɑːˈjɑːɡə/', pos:'noun', def:'A major river in central Peru, a tributary of the Amazon, flowing through the Andes and into the tropical lowlands.', lang:'Quechua, from Huallaga, the indigenous name for this major Peruvian river that flows north through the Andes into the Amazon basin.', example:'The Huallaga River carves a deep valley through the Peruvian Andes before winding through tropical rainforest to join the Amazon system.', isNoun:true },
  { word:'huerta', pronunciation:'WAIR-tah', ipa:'/ˈwɛərtə/', pos:'noun', def:'An irrigated, fertile area of land used for agriculture in Spain, especially for growing fruits and vegetables.', lang:'Spanish, from huerta (\'an irrigated garden, orchard\'), from Latin hortus (\'a garden\').', example:'The huerta of Valencia has been irrigated for over a thousand years, its fertile plots producing the oranges and rice that define the region\'s cuisine.', isNoun:true },
  { word:'Humboldt', pronunciation:'HUM-bohlt', ipa:'/ˈhʌmboʊlt/', pos:'noun', def:'Alexander von Humboldt, the Prussian naturalist and explorer; also a cold ocean current, a penguin species, a squid, and numerous geographic features named after him.', lang:'German surname, from Humboldt, borne by Alexander von Humboldt (1769-1859), the polymath explorer who mapped and described vast regions of the Americas.', example:'The cold Humboldt Current flows northward along South America\'s Pacific coast, its nutrient-rich waters supporting one of the world\'s most productive fisheries.', isNoun:true },
  { word:'hutia', pronunciation:'hoo-TEE-uh', ipa:'/huːˈtiːə/', pos:'noun', def:'A large rodent native to the Caribbean islands, resembling a guinea pig or small beaver, some species now critically endangered.', lang:'Spanish, from jutía, from Taino hutia, the indigenous Caribbean name for these island-dwelling rodents.', example:'The Cuban hutia, the largest surviving Caribbean rodent, lumbered through the mangrove roots looking like an oversized guinea pig.', isNoun:true },
  { word:'jutia', pronunciation:'hoo-TEE-uh', ipa:'/huːˈtiːə/', pos:'noun', def:'A variant spelling of hutia; a large Caribbean rodent of the family Capromyidae.', lang:'Spanish, from jutía, the Spanish spelling of the Taino word for these endemic Caribbean rodents.', example:'The jutia population on the small island had recovered thanks to conservation efforts that removed the invasive predators threatening their survival.', isNoun:true },
  { word:'utia', pronunciation:'oo-TEE-uh', ipa:'/uːˈtiːə/', pos:'noun', def:'Another variant name for the hutia; a Caribbean rodent found on various islands of the West Indies.', lang:'Spanish, variant of jutía or hutia, from Taino, the indigenous Arawak name for these rodents.', example:'Early European explorers reported the utia as an important food source for the island\'s indigenous Taino people.', isNoun:true },
  { word:'hypaethral', pronunciation:'hy-PEE-thrul', ipa:'/haɪˈpiːθrəl/', pos:'adjective', def:'Of a building or part of a building, open to the sky; having no roof; exposed to the open air.', lang:'Greek, from hypaithros (\'under the sky, in the open air\'), from hypo (\'under\') + aither (\'sky, upper air\').', example:'The hypaethral temple had no roof over its central hall, allowing worshippers to stand beneath the open sky during ceremonies.', isNoun:false },
  { word:'hyssop', pronunciation:'HIS-up', ipa:'/ˈhɪsəp/', pos:'noun', def:'An aromatic plant of the mint family used in cooking and herbal medicine, with biblical associations with purification and cleansing rituals.', lang:'Greek, from hyssopos, from Hebrew ezov (\'hyssop\'), the purifying herb mentioned frequently in the Bible.', example:'The medieval monks grew hyssop in their physic garden, using the aromatic herb both for flavoring food and for treating chest ailments.', isNoun:true },
  { word:'hysteresis', pronunciation:'HIS-tuh-REE-sis', ipa:'/ˌhɪstəˈriːsɪs/', pos:'noun', def:'The dependence of a system\'s state on its history; the lagging of an effect behind its cause, especially in magnetic or elastic materials.', lang:'Greek, from hysteresis (\'a coming short, deficiency\'), from hysterein (\'to be behind, come late\'), from hystera (\'later\').', example:'The engineer accounted for hysteresis in the magnetic core, knowing that the material\'s response would lag behind changes in the applied field.', isNoun:true },
  { word:'hysteron proteron', pronunciation:'HIS-tuh-ron PROT-uh-ron', ipa:'/ˌhɪstərɒn ˈprɒtərɒn/', pos:'noun', def:'A rhetorical device in which the logical order of events is reversed; putting the cart before the horse in speech or writing.', lang:'Greek, from hysteron (\'the latter\') + proteron (\'the former\'), literally \'the latter before the former\'.', example:'Shakespeare\'s "I come to bury Caesar, not to praise him" is a famous hysteron proteron, with the burial mentioned before the praise.', isNoun:true }
];

let currentIndex = 0, flipped = false, markedWords = new Set(), markedOnly = false;
let imageCache = {};
let imageLoading = {};
let touchStartX = 0, swipeX = 0;

const wikiImageMap = {
  'haikai': 'Haikai',
  'halala': 'Saudi_riyal',
  'halalah': 'Saudi_riyal',
  'Hamtramck': 'Hamtramck,_Michigan',
  'hangul': 'Hangul',
  'hapalonychia': 'Nail_(anatomy)',
  'haupia': 'Haupia',
  'heiau': 'Heiau',
  'hei-tiki': 'Hei-tiki',
  'hellebore': 'Hellebore',
  'hemorrhage': 'Hemorrhage',
  'hennin': 'Hennin',
  'henotheism': 'Henotheism',
  'hepatectomy': 'Hepatectomy',
  'Hessian': 'Hessian_(soldier)',
  'hexenbesen': 'Witch%27s_broom',
  'hieracosphinx': 'Hieracosphinx',
  'Hippolyta': 'Hippolyta',
  'hoi polloi': 'Hoi_polloi',
  'hominin': 'Hominini',
  'homoscedasticity': 'Homoscedasticity',
  'hordeolum': 'Stye',
  'houppelande': 'Houppelande',
  'Hsia': 'Xia_dynasty',
  'Huallaga': 'Huallaga_River',
  'huerta': 'Huerta',
  'Humboldt': 'Alexander_von_Humboldt',
  'hutia': 'Hutia',
  'jutia': 'Hutia',
  'utia': 'Hutia',
  'hyssop': 'Hyssop',
  'hysteresis': 'Hysteresis',
  'hysteron proteron': 'Hysteron_proteron'
};

async function loadImages() {
  for (const [word, article] of Object.entries(wikiImageMap)) {
    try {
      const resp = await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(article));
      if (resp.ok) {
        const data = await resp.json();
        if (data.thumbnail && data.thumbnail.source) {
          let url = data.thumbnail.source;
          url = url.replace(/\/\d+px-/, '/400px-');
          imageCache[word] = url;
          const imgEl = document.getElementById('img-' + word);
          if (imgEl) {
            imgEl.innerHTML = '<div class="image-box"><img class="word-img" src="' + url + '" alt="' + word + '" onerror="this.parentElement.style.display=\'none\'"><div class="img-caption">' + word + '</div></div>';
          }
        }
      }
    } catch(e) {}
  }
}

loadImages();

function aw() { return markedOnly ? WORDS.filter((_,i) => markedWords.has(i)) : WORDS; }
function si() { const a=aw(); if(markedOnly){const i=a.findIndex(w=>w.word===WORDS[currentIndex]?.word);return i>=0?i:0;} return currentIndex; }
function gi() { const a=aw(),s=si(); return WORDS.findIndex(w=>w.word===a[s]?.word); }

function speak(t) { speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.rate=0.85;u.pitch=1;u.lang="en-US"; speechSynthesis.speak(u); }

const starSvg=f=>`<svg viewBox="0 0 24 24" fill="${f?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
const speakerSvg=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;

function renderFront(w) {
  return `
    <div class="sect fade-in"><div class="tag">PRONUNCIATION</div><div class="pron-main">${w.pronunciation}</div><div class="ipa">${w.ipa}</div>
      <button class="listen-btn" onclick="event.stopPropagation();speak('${w.word}')">${speakerSvg}<span>Listen</span></button></div>
    <div class="sect fade-in" style="animation-delay:.06s"><div class="tag">PART OF SPEECH</div><span class="pos-chip">${w.pos}</span></div>
    <div class="sect fade-in" style="animation-delay:.12s"><div class="tag">DEFINITION</div><div class="def-text">${w.def}</div></div>
    <div class="sect fade-in" style="animation-delay:.18s"><div class="tag">LANGUAGE OF ORIGIN</div><div class="origin-text">${w.lang}</div></div>
    <div class="sect fade-in" style="animation-delay:.24s"><div class="tag">EXAMPLE</div><div class="ex-text">"${w.example.replace(new RegExp(w.word,'gi'),'________')}"</div></div>
    <div class="tap-hint fade-in" style="animation-delay:.3s">Tap card to reveal spelling</div>`;
}

function renderBack(w) {
  const letters=w.word.split("").map((c,i)=>`<span class="letter-tile" style="animation-delay:${i*0.04+0.12}s">${c}</span>`).join("");
  let img="";
  if(w.isNoun){
    let imgContent = "";
    if(imageCache[w.word]) imgContent=`<div class="image-box"><img class="word-img" src="${imageCache[w.word]}" alt="${w.word}" onerror="this.parentElement.style.display='none'"><div class="img-caption">${w.word}</div></div>`;
    else if(wikiImageMap[w.word]) imgContent=`<div class="loading-box"><div class="spinner"></div><span class="loading-text">Loading image…</span></div>`;
    img=`<div id="img-${w.word}">${imgContent}</div>`;
  }
  return `<div class="back-content">
    <div class="spelling-box" style="animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both">
      <div class="spelling-label">THE WORD IS</div><h2 class="spelling-word">${w.word}</h2>
      <div class="letters-row">${letters}</div>
      <button class="listen-btn" style="margin:14px auto 0" onclick="event.stopPropagation();speak('${w.word}')">${speakerSvg}<span>Hear Again</span></button>
    </div>${img}
    <div class="tap-hint">Tap card to go back to clues</div></div>`;
}

function render() {
  const a=aw();
  if(!a.length){ document.getElementById("card").innerHTML=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px"><p style="color:rgba(255,255,255,0.5);font-size:16px">No marked words yet.</p><button class="flip-btn" style="width:auto;padding:10px 24px" onclick="markedOnly=false;render()">← Show All</button></div>`; return; }
  const s=si(), g=gi(), w=a[s];

  document.getElementById("card").innerHTML=`<div class="card-top"><span class="counter">${s+1} / ${a.length}</span><div class="card-top-right"><span class="side-label">${flipped?'ANSWER':'CLUES'}</span><button class="mark-btn ${markedWords.has(g)?'active':''}" onclick="toggleMark(${g})">${starSvg(markedWords.has(g))}</button></div></div>`+(flipped?renderBack(w):renderFront(w));

  // Images loaded in background via loadImages()

  // Slider
  const totalA = a.length;
  const pct = totalA > 1 ? s / (totalA - 1) * 100 : 0;
  document.getElementById("sliderFill").style.width = pct + "%";
  const sliderArea = document.getElementById("sliderArea");
  const areaW = sliderArea.offsetWidth || 200;
  const pad = 10;
  const thumbLeft = pad + (pct / 100) * (areaW - pad * 2);
  const thumb = document.getElementById("sliderThumb");
  if(!thumb.classList.contains('dragging')) thumb.style.left = thumbLeft + "px";

  // Ticks - show ~20 evenly spaced markers
  const tickCount = Math.min(totalA, 20);
  let ticksHtml = '';
  for(let t=0; t<tickCount; t++){
    const ti = Math.round(t / (tickCount-1) * (totalA-1));
    const cls = ti===s ? 'active' : (t % 5 === 0 ? 'major' : '');
    ticksHtml += `<div class="slider-tick ${cls}"></div>`;
  }
  document.getElementById("sliderDots").innerHTML = ticksHtml;
  document.getElementById("sliderCounter").textContent = `${s+1} / ${totalA}`;

  // Mode btn
  const mb=document.getElementById("modeBtn");
  mb.className="mode-btn"+(markedOnly?" active":"");
  mb.querySelector("svg").setAttribute("fill",markedOnly?"currentColor":"none");
  document.getElementById("modeBtnText").textContent=(markedOnly?"Marked":"All")+` (${markedOnly?markedWords.size:WORDS.length})`;
}

function jumpTo(idx) {
  const a=aw(); if(idx<0||idx>=a.length) return;
  const g=WORDS.findIndex(w=>w.word===a[idx].word);
  flipped=false; currentIndex=g; render();
  setTimeout(()=>speak(a[idx].word),200);
}

function navigateTo(dir) {
  const a=aw(); if(!a.length) return;
  const s=si(), card=document.getElementById("card");
  card.classList.add(dir==="left"?"slide-out-l":"slide-out-r");
  flipped=false;
  setTimeout(()=>{
    card.classList.remove("slide-out-l","slide-out-r");
    const ni=dir==="left"?(s+1)%a.length:(s-1+a.length)%a.length;
    currentIndex=WORDS.findIndex(w=>w.word===a[ni].word);
    render(); setTimeout(()=>speak(a[ni].word),150);
  },220);
}

function flipCard(){flipped=!flipped;render();}
function toggleMark(g){markedWords.has(g)?markedWords.delete(g):markedWords.add(g);render();}
function toggleMarkedOnly(){if(!markedOnly&&markedWords.size===0)return;markedOnly=!markedOnly;flipped=false;render();}

// Swipe
const ca=document.getElementById("cardArea");
let swiped=false;
ca.addEventListener("touchstart",e=>{touchStartX=e.touches[0].clientX;swiped=false;},{passive:true});
ca.addEventListener("touchmove",e=>{swipeX=e.touches[0].clientX-touchStartX;if(Math.abs(swipeX)>15)swiped=true;},{passive:true});
ca.addEventListener("touchend",()=>{if(Math.abs(swipeX)>50)navigateTo(swipeX<0?"left":"right");swipeX=0;});

// Card tap to flip
const card=document.getElementById("card");
card.addEventListener("click",e=>{
  if(e.target.closest('button')||swiped) return;
  flipCard();
});

// Slider drag
const slArea=document.getElementById("sliderArea");
const slThumb=document.getElementById("sliderThumb");
let slDragging=false;
function sliderFromX(cx){
  const r=slArea.getBoundingClientRect();
  const pad=10;
  const p=Math.max(0,Math.min(1,(cx-r.left-pad)/(r.width-pad*2)));
  const a=aw(),idx=Math.round(p*(a.length-1));
  // Move thumb immediately for smooth feel
  const thumbLeft=pad+(p)*(r.width-pad*2);
  slThumb.style.left=thumbLeft+"px";
  if(idx!==si()){
    const g=WORDS.findIndex(w=>w.word===a[idx].word);
    flipped=false; currentIndex=g; render();
  }
}
slArea.addEventListener("touchstart",e=>{
  slDragging=true; slThumb.classList.add('dragging');
  sliderFromX(e.touches[0].clientX);
},{passive:true});
document.addEventListener("touchmove",e=>{
  if(slDragging) sliderFromX(e.touches[0].clientX);
},{passive:true});
document.addEventListener("touchend",()=>{
  if(slDragging){
    slDragging=false; slThumb.classList.remove('dragging');
    // Speak the word after releasing
    const a=aw(),s=si();
    if(a[s]) setTimeout(()=>speak(a[s].word),100);
  }
});
slArea.addEventListener("mousedown",e=>{
  slDragging=true; slThumb.classList.add('dragging');
  sliderFromX(e.clientX); e.preventDefault();
});
document.addEventListener("mousemove",e=>{
  if(slDragging) sliderFromX(e.clientX);
});
document.addEventListener("mouseup",()=>{
  if(slDragging){
    slDragging=false; slThumb.classList.remove('dragging');
    const a=aw(),s=si();
    if(a[s]) setTimeout(()=>speak(a[s].word),100);
  }
});

// Keyboard
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight")navigateTo("left");
  else if(e.key==="ArrowLeft")navigateTo("right");
  else if(e.key===" "){e.preventDefault();flipCard();}
});

render();
setTimeout(()=>speak(WORDS[0].word),500);
</script>
</body>
</html>
