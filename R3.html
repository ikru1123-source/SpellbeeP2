<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Spelling Bee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #d4af37;
  --gold-dim: rgba(212,175,55,0.5);
  --gold-glow: rgba(212,175,55,0.15);
  --bg: #0c0a13;
  --card: rgba(30,26,46,0.97);
  --text: #f0ece2;
  --text-dim: rgba(255,255,255,0.55);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
}
body {
  display: flex; flex-direction: column;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
  background: linear-gradient(170deg, #0c0a13 0%, #1a1528 45%, #110e1c 100%);
}

/* Header */
.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px 6px; flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 9px; }
.header-left span { font-size: 22px; }
.header-left h1 {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 700; letter-spacing: 0.02em;
}
.mode-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 13px; border-radius: 20px;
  border: 1.5px solid rgba(255,255,255,0.18);
  background: transparent; color: var(--text-dim);
  font-size: 12px; font-weight: 500; cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: all 0.25s;
}
.mode-btn.active {
  background: var(--gold-glow); border-color: var(--gold); color: var(--gold);
}
.mode-btn svg { width: 14px; height: 14px; }

/* Card */
.card-area {
  flex: 1; display: flex; flex-direction: column;
  padding: 6px 10px 0; overflow: hidden;
}
.card {
  flex: 1; display: flex; flex-direction: column;
  background: linear-gradient(150deg, rgba(38,32,56,0.97), rgba(22,18,36,0.99));
  border-radius: 22px;
  border: 1px solid rgba(212,175,55,0.1);
  padding: 16px 16px 14px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  transition: transform 0.08s ease;
}
.card::-webkit-scrollbar { display: none; }
.card-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px; flex-shrink: 0;
}
.counter { font-size: 11px; color: rgba(255,255,255,0.3); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
.side-label { font-size: 9px; font-weight: 700; letter-spacing: 0.16em; color: var(--gold-dim); text-transform: uppercase; }
.card-top-right { display: flex; align-items: center; gap: 10px; }
.mark-btn {
  background: none; border: none; cursor: pointer; padding: 2px;
  color: rgba(255,255,255,0.25); transition: all 0.2s;
}
.mark-btn.active { color: var(--gold); }
.mark-btn svg { width: 22px; height: 22px; }

/* Sections */
.sect { display: flex; flex-direction: column; gap: 3px; margin-bottom: 11px; }
.tag {
  font-size: 9px; font-weight: 700; letter-spacing: 0.16em;
  color: var(--gold); text-transform: uppercase; opacity: 0.75; margin-bottom: 1px;
}
.pron-main {
  font-family: 'Playfair Display', serif;
  font-size: 21px; font-weight: 700; letter-spacing: 0.05em;
}
.ipa { font-size: 13px; color: rgba(255,255,255,0.38); font-family: monospace; }
.listen-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 14px; border-radius: 20px;
  border: 1px solid rgba(212,175,55,0.3); background: rgba(212,175,55,0.08);
  color: var(--gold); cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-size: 12.5px; font-weight: 500; margin-top: 5px; align-self: flex-start;
  transition: all 0.2s;
}
.listen-btn:active { background: rgba(212,175,55,0.2); }
.listen-btn svg { width: 15px; height: 15px; }
.pos-chip {
  display: inline-block; padding: 3px 12px; border-radius: 14px;
  background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.22);
  color: var(--gold); font-size: 13px; font-weight: 600; font-style: italic;
}
.def-text { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.85); }
.origin-text { font-size: 13px; line-height: 1.55; color: var(--text-dim); font-style: italic; }
.ex-text {
  font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.65);
  border-left: 3px solid rgba(212,175,55,0.35); padding-left: 12px; font-style: italic;
}

/* Tap hint */
.tap-hint {
  text-align: center; padding: 12px 0 4px;
  font-size: 12px; color: rgba(255,255,255,0.2);
  letter-spacing: 0.04em; flex-shrink: 0;
}

/* Back */
.back-content { display: flex; flex-direction: column; align-items: center; gap: 20px; padding-top: 6px; flex: 1; }
.spelling-box {
  text-align: center; width: 100%; padding: 22px 12px 18px;
  background: linear-gradient(135deg, rgba(212,175,55,0.07), rgba(212,175,55,0.02));
  border-radius: 16px; border: 1px solid rgba(212,175,55,0.15);
}
.spelling-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.22em;
  color: rgba(212,175,55,0.6); text-transform: uppercase; margin-bottom: 10px;
}
.spelling-word {
  font-family: Verdana, Geneva, sans-serif; font-size: 36px; font-weight: 400;
  letter-spacing: 0.04em; line-height: 1.15;
  text-shadow: 0 2px 16px rgba(212,175,55,0.2); margin-bottom: 14px;
}
.letters-row { display: flex; justify-content: center; gap: 3px; flex-wrap: wrap; }
.letter-tile {
  display: inline-flex; align-items: center; justify-content: center;
  width: 27px; height: 34px; border-radius: 6px;
  background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.2);
  color: var(--gold); font-family: 'Playfair Display', serif;
  font-size: 17px; font-weight: 700;
  animation: letterPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
}
.image-box {
  width: 300px; height: 300px; border-radius: 14px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08); position: relative;
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  animation-delay: 0.15s; margin: 0 auto;
}
.word-img { width: 300px; height: 300px; object-fit: cover; display: block; }
.img-caption {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 20px 14px 8px;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7);
  letter-spacing: 0.06em; text-transform: capitalize;
}
.loading-box { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 20px 0; }
.spinner {
  width: 22px; height: 22px;
  border: 2.5px solid rgba(212,175,55,0.2);
  border-top-color: var(--gold); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-text { color: rgba(255,255,255,0.35); font-size: 12px; }

/* Bottom bar */
.bottom-bar {
  flex-shrink: 0;
  padding: 10px 16px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.nav-row {
  display: flex; align-items: center; justify-content: center; gap: 12px;
}
.nav-arrow {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.5); cursor: pointer;
  transition: all 0.2s; flex-shrink: 0;
}
.nav-arrow:active { background: rgba(212,175,55,0.15); border-color: var(--gold); color: var(--gold); transform: scale(0.92); }
.nav-arrow svg { width: 18px; height: 18px; }
.slider-area {
  flex: 1; height: 32px; position: relative;
  display: flex; align-items: center;
  touch-action: none; cursor: pointer;
}
.slider-track-bg {
  width: 100%; height: 3px; border-radius: 2px;
  background: rgba(255,255,255,0.08); position: relative; overflow: hidden;
}
.slider-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--gold), rgba(212,175,55,0.5));
  transition: width 0.15s ease;
}
.slider-dots {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: space-between;
  pointer-events: none; padding: 0 2px;
}
.slider-tick {
  width: 2px; height: 8px; border-radius: 1px;
  background: rgba(255,255,255,0.06); flex-shrink: 0;
}
.slider-tick.major { height: 12px; background: rgba(255,255,255,0.12); }
.slider-tick.active { background: var(--gold); height: 14px; width: 3px; border-radius: 1.5px; box-shadow: 0 0 6px rgba(212,175,55,0.4); }
.slider-thumb {
  position: absolute; top: 50%; transform: translate(-50%, -50%);
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--gold);
  border: 2.5px solid #1a1528;
  box-shadow: 0 0 10px rgba(212,175,55,0.5), 0 2px 6px rgba(0,0,0,0.4);
  cursor: grab; transition: left 0.12s ease;
  z-index: 2;
}
.slider-thumb:active { cursor: grabbing; transform: translate(-50%, -50%) scale(1.15); }
.slider-thumb.dragging { transition: none; transform: translate(-50%, -50%) scale(1.15); }
.slider-counter {
  text-align: center; font-size: 11px; font-weight: 600;
  color: rgba(255,255,255,0.25); letter-spacing: 0.08em;
}

/* Animations */
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes popIn { 0% { transform: scale(0.92); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
@keyframes letterPop { 0% { transform: scale(0) rotate(-8deg); opacity: 0; } 60% { transform: scale(1.1) rotate(2deg); opacity: 1; } 100% { transform: scale(1) rotate(0); opacity: 1; } }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes slideOutL { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-105%); opacity: 0; } }
@keyframes slideOutR { from { transform: translateX(0); opacity: 1; } to { transform: translateX(105%); opacity: 0; } }
.slide-out-l { animation: slideOutL 0.22s ease forwards; }
.slide-out-r { animation: slideOutR 0.22s ease forwards; }
.fade-in { animation: fadeUp 0.3s ease both; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span>🐝</span>
    <h1><a href="index.html" style="color:inherit;text-decoration:none;">Spelling Bee</a></h1>
  </div>
  <button class="mode-btn" id="modeBtn" onclick="toggleMarkedOnly()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span id="modeBtnText">All (6)</span>
  </button>
</div>

<div class="card-area" id="cardArea">
  <div class="card" id="card"></div>
</div>

<div class="bottom-bar">
  <div class="nav-row">
    <button class="nav-arrow" id="prevBtn" onclick="navigateTo('right')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="slider-area" id="sliderArea">
      <div class="slider-track-bg">
        <div class="slider-fill" id="sliderFill"></div>
      </div>
      <div class="slider-dots" id="sliderDots"></div>
      <div class="slider-thumb" id="sliderThumb"></div>
    </div>
    <button class="nav-arrow" id="nextBtn" onclick="navigateTo('left')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
  </div>
  <div class="slider-counter" id="sliderCounter">1 / 208</div>
</div>

<script>
const WORDS = [
  { word:'raclette', pronunciation:'rah-KLET', ipa:'/rɑːˈklɛt/', pos:'noun', def:'A Swiss dish of melted cheese scraped onto potatoes, pickles, and cured meat; also the semi-hard cheese used in this dish.', lang:'French, from racler (\'to scrape\'), from Old French rascler, because the melted cheese is scraped from the wheel onto the plate.', example:'The waiter tilted the half-wheel of raclette toward the heat, then scraped a cascade of melted cheese over a mound of boiled potatoes and cornichons.', isNoun:true },
  { word:'rafflesia', pronunciation:'rah-FLEE-zhuh', ipa:'/rɑːˈfliːʒə/', pos:'noun', def:'A genus of parasitic plants producing the world\'s largest individual flowers, famous for their foul smell of rotting flesh.', lang:'Named after Sir Stamford Raffles (1781-1826), the British colonial administrator who co-discovered this extraordinary plant in Sumatra.', example:'The rafflesia bloom measured over three feet across, its mottled red petals emitting a stench of decay that attracted pollinating flies from miles away.', isNoun:true },
  { word:'railleur', pronunciation:'ry-YUR', ipa:'/raɪˈjɜːr/', pos:'noun', def:'A person given to raillery; one who mocks or teases in a good-humored way; a banterer.', lang:'French, from railleur (\'a mocker, jester\'), from railler (\'to mock, tease\'), of uncertain origin.', example:'The salon\'s chief railleur could deflate any pomposity with a perfectly timed quip, his wit admired even by those it targeted.', isNoun:true },
  { word:'rajpramukh', pronunciation:'RAHJ-pruh-mook', ipa:'/ˈrɑːdʒprəˌmuːk/', pos:'noun', def:'The title of the governor or head of a state in India after independence, especially in the former princely states before they were reorganized.', lang:'Hindi, from raj (\'rule, kingdom\') + pramukh (\'chief, head\'), the constitutional head of merged princely states.', example:'The rajpramukh served as the ceremonial head of the newly formed state, bridging the transition from princely rule to democratic governance.', isNoun:true },
  { word:'rapparee', pronunciation:'RAP-uh-REE', ipa:'/ˌræpəˈriː/', pos:'noun', def:'An Irish irregular soldier or guerrilla fighter, especially one who fought against English rule in the 17th century; later, a bandit or freebooter.', lang:'Irish, from rapaire (\'a short pike, a robber\'), describing the dispossessed Irish who took to guerrilla warfare after the Williamite War.', example:'The rapparees hid in the bogs and forests of Connacht, striking English supply lines before vanishing back into the wild Irish landscape.', isNoun:true },
  { word:'rapprochement', pronunciation:'RAP-rohsh-MAHN', ipa:'/ˌræproʊʃˈmɑːn/', pos:'noun', def:'The establishment or resumption of harmonious relations between nations or groups that have been in conflict; a reconciliation.', lang:'French, from rapprochement (\'a bringing together\'), from rapprocher (\'to bring near\'), from re- + approcher (\'to approach\').', example:'The diplomatic rapprochement between the two former enemies was sealed with a historic handshake, ending decades of hostility.', isNoun:true },
  { word:'Rastafarian', pronunciation:'RAS-tuh-FAIR-ee-un', ipa:'/ˌræstəˈfɛəriən/', pos:'noun', def:'A follower of Rastafari, a religious and social movement originating in Jamaica that regards Emperor Haile Selassie of Ethiopia as divine.', lang:'From Ras Tafari, the pre-coronation title of Ethiopian Emperor Haile Selassie, from Amharic ras (\'head, prince\') + Tafari (\'one who is revered\').', example:'The Rastafarian elder spoke of Zion and liberation, his dreadlocks and faith rooted in a tradition that blends African identity with spiritual resistance.', isNoun:true },
  { word:'Rayleigh wave', pronunciation:'RAY-lee WAYV', ipa:'/ˈreɪli ˌweɪv/', pos:'noun', def:'A type of surface seismic wave that causes the ground to move in an elliptical rolling motion, responsible for much earthquake damage.', lang:'Named after Lord Rayleigh (John William Strutt, 1842-1919), the British physicist who predicted these surface waves mathematically.', example:'The Rayleigh waves rolled through the city like ocean swells, the ground heaving in slow, destructive undulations that toppled buildings.', isNoun:true },
  { word:'realpolitik', pronunciation:'ray-AHL-poh-lih-TEEK', ipa:'/reɪˈɑːlpoʊlɪˌtiːk/', pos:'noun', def:'Politics based on practical objectives rather than ideals or moral principles; pragmatic diplomacy driven by national interest.', lang:'German, from real (\'practical\') + Politik (\'politics\'), the approach to statecraft advocated by Bismarck.', example:'The ambassador practiced realpolitik with cold efficiency, setting aside moral qualms to secure an alliance that served the national interest.', isNoun:true },
  { word:'recamier', pronunciation:'REK-uh-mee-ay', ipa:'/ˌrɛkəmiˈeɪ/', pos:'noun', def:'A backless couch or daybed with curved, scrolled ends of equal height, named after a famous Parisian socialite.', lang:'Named after Juliette Recamier (1777-1849), the celebrated French beauty and hostess, depicted reclining on such a couch in a famous portrait by David.', example:'She draped herself across the recamier in conscious imitation of the famous painting, the elegant backless couch perfectly suited to languid afternoon conversation.', isNoun:true },
  { word:'redingote', pronunciation:'RED-in-goht', ipa:'/ˈrɛdɪŋˌɡoʊt/', pos:'noun', def:'A woman\'s long fitted coat or dress with a front opening showing a decorative underskirt, popular in the 18th and 19th centuries.', lang:'French, from redingote, a corruption of English riding coat, borrowed and adapted into French fashion.', example:'The actress wore a burgundy redingote over a cream silk dress, the fitted coat\'s elegant lines evoking Napoleonic-era Parisian fashion.', isNoun:true },
  { word:'rembrandt', pronunciation:'REM-brant', ipa:'/ˈrɛmbrɑːnt/', pos:'noun', def:'A style of portrait lighting in which one half of the face is illuminated while the other half has a small triangle of light on the cheek, used in photography.', lang:'Named after Rembrandt van Rijn (1606-1669), the Dutch master painter known for his dramatic use of light and shadow in portraits.', example:'The photographer positioned the light for a rembrandt effect, the triangle of illumination on the shadowed cheek creating the dramatic mood of a Dutch master painting.', isNoun:true },
  { word:'rennet', pronunciation:'REN-it', ipa:'/ˈrɛnɪt/', pos:'noun', def:'A substance containing enzymes used to curdle milk in the process of making cheese, traditionally obtained from the stomach lining of young calves.', lang:'Middle English, from rennen (\'to run, curdle\'), from Old English gerinnan (\'to coagulate\'), because rennet causes milk to solidify.', example:'The cheesemaker added rennet to the warm milk, the enzyme causing the liquid to separate into curds and whey within minutes.', isNoun:true },
  { word:'renvoi', pronunciation:'ren-VOY', ipa:'/rɛnˈvɔɪ/', pos:'noun', def:'In law, the referral of a case from one jurisdiction to another; the process by which one country\'s legal system refers to the laws of another.', lang:'French, from renvoi (\'a sending back, referral\'), from renvoyer (\'to send back\'), from re- + envoyer (\'to send\').', example:'The court applied the doctrine of renvoi, referring the inheritance dispute to French law since the deceased had been domiciled in Paris.', isNoun:true },

  { word:'rhododendron', pronunciation:'ROH-duh-DEN-drun', ipa:'/ˌroʊdəˈdɛndrən/', pos:'noun', def:'A large genus of flowering shrubs and small trees with showy clusters of bell-shaped flowers, found worldwide in temperate and tropical regions.', lang:'Greek, from rhodon (\'a rose\') + dendron (\'a tree\'), literally \'rose tree\'.', example:'The rhododendrons burst into bloom along the mountain trail, their massive clusters of pink and purple flowers transforming the hillside into a living tapestry.', isNoun:true },
  { word:'rhyton', pronunciation:'RY-ton', ipa:'/ˈraɪtɒn/', pos:'noun', def:'An ancient drinking vessel shaped like a horn or an animal head, with a hole at the bottom through which liquid flowed.', lang:'Greek, from rhyton (\'a drinking horn\'), from rhein (\'to flow\'), the ceremonial drinking cup of ancient Greece and Persia.', example:'The museum displayed a golden rhyton shaped like a winged griffin, the ancient Persian drinking vessel still gleaming after two and a half millennia.', isNoun:true },
  { word:'rickettsial', pronunciation:'rih-KET-see-ul', ipa:'/rɪˈkɛtsiəl/', pos:'adjective', def:'Of or relating to Rickettsia, a genus of bacteria that cause diseases such as typhus and Rocky Mountain spotted fever, transmitted by ticks, fleas, and lice.', lang:'Named after Howard Taylor Ricketts (1871-1910), the American pathologist who identified these bacteria, + -ial.', example:'The doctor suspected a rickettsial infection after noting the characteristic rash and history of tick exposure during the patient\'s recent hiking trip.', isNoun:false },
  { word:'rinceau', pronunciation:'ran-SOH', ipa:'/rænˈsoʊ/', pos:'noun', def:'An ornamental motif of scrolling vine tendrils, leaves, and flowers used in architectural and decorative design.', lang:'French, from rinceau (\'a scroll of foliage\'), from Old French rinsel, diminutive of rince (\'a branch\').', example:'The marble frieze was carved with an elegant rinceau of acanthus leaves and spiraling tendrils, the flowing botanical ornament characteristic of Renaissance design.', isNoun:true },
  { word:'risorgimento', pronunciation:'rih-SOR-jih-MEN-toh', ipa:'/rɪˌsɔːrdʒɪˈmɛntoʊ/', pos:'noun', def:'The 19th-century movement for Italian political unification, culminating in the creation of the Kingdom of Italy in 1861.', lang:'Italian, from risorgimento (\'a rising again, resurgence\'), from risorgere (\'to rise again\'), from Latin resurgere.', example:'The Risorgimento transformed the Italian peninsula from a patchwork of kingdoms and duchies into a unified nation under one flag.', isNoun:true },
  { word:'risposta', pronunciation:'ris-POS-tuh', ipa:'/rɪsˈpɒstə/', pos:'noun', def:'In music, the answer or response in a fugue, the voice that enters after the subject and imitates it; also a fencing riposte.', lang:'Italian, from risposta (\'an answer, response\'), from rispondere (\'to respond\'), from Latin respondere.', example:'The fugue\'s risposta entered in the dominant key, the second voice imitating the subject with elegant precision before the third voice joined.', isNoun:true },
  { word:'rissole', pronunciation:'RIS-ohl', ipa:'/ˈrɪsoʊl/', pos:'noun', def:'A small fried or baked patty of minced meat or fish coated in breadcrumbs, popular in European and Australian cuisine.', lang:'French, from rissole (\'a fried pastry\'), from Old French rissole, from Latin russeolus (\'reddish\'), from the golden-brown color of frying.', example:'The golden rissoles emerged from the pan crispy and fragrant, the herbed lamb filling steaming inside its crunchy breadcrumb shell.', isNoun:true },
  { word:'Robigalia', pronunciation:'ROH-bih-GAY-lee-uh', ipa:'/ˌroʊbɪˈɡeɪliə/', pos:'noun', def:'An ancient Roman festival held on April 25 to appease Robigus, the god of crop disease, and protect grain from blight and rust.', lang:'Latin, from Robigalia, from Robigus (\'the god of rust or mildew\'), from robigo (\'rust, blight\'), the festival to protect crops.', example:'The Romans celebrated the Robigalia with the sacrifice of a red dog and prayers that Robigus would spare the wheat harvest from devastating rust.', isNoun:true },
  { word:'rocaille', pronunciation:'roh-KY', ipa:'/roʊˈkaɪ/', pos:'noun', def:'An ornamental style featuring shells, rocks, and elaborate scrollwork, the decorative foundation of the Rococo style.', lang:'French, from rocaille (\'pebble-work, shell-work\'), from roc (\'a rock\'), the shell and stone ornamentation that gave Rococo its name.', example:'The grotto walls were encrusted with rocaille, the elaborate arrangement of shells, pebbles, and scrollwork glittering in the candlelight.', isNoun:true },
  { word:'roi faineant', pronunciation:'RWAH fay-nay-AHN', ipa:'/ˌrwɑː feɪneɪˈɑːn/', pos:'noun', def:'A do-nothing king; a monarch who reigns in name only while real power is held by ministers or advisors.', lang:'French, from roi (\'a king\') + faineant (\'idle, do-nothing\'), from fait (\'does\') + neant (\'nothing\').', example:'The last Merovingian kings were rois faineants, puppet monarchs who sat on the throne while the mayors of the palace wielded all real power.', isNoun:true },
  { word:'rond de jambe', pronunciation:'ROHN duh ZHAHMB', ipa:'/ˌrɒnd də ˈʒɑːmb/', pos:'noun', def:'A ballet movement in which one leg traces a semicircle on the floor or in the air, used as an exercise at the barre.', lang:'French, from rond (\'round\') + de (\'of\') + jambe (\'leg\'), literally \'circle of the leg\'.', example:'The ballet students performed rond de jambe at the barre, each dancer\'s pointed toe tracing a smooth semicircle on the studio floor.', isNoun:true },
  { word:'rondeau', pronunciation:'RON-doh', ipa:'/ˈrɒndoʊ/', pos:'noun', def:'A French verse form of thirteen lines with only two rhymes, featuring a refrain from the opening words repeated twice.', lang:'French, from rondeau (\'a little round\'), from rondel, diminutive of rond (\'round\'), describing the circular return of the refrain.', example:'The poet crafted a rondeau with exquisite precision, the opening phrase returning as a haunting refrain that gave the thirteen lines a musical completeness.', isNoun:true },
  { word:'rooseveltite', pronunciation:'ROH-zuh-velt-yt', ipa:'/ˈroʊzəˌvɛltaɪt/', pos:'noun', def:'A rare mineral consisting of bismuth arsenate, found in hydrothermal deposits.', lang:'Named after Franklin Delano Roosevelt (1882-1945), the 32nd President of the United States, + -ite (mineral suffix).', example:'The mineralogist identified the tiny white crystals as rooseveltite, the rare bismuth arsenate mineral found in only a handful of locations worldwide.', isNoun:true },
  { word:'rosemaling', pronunciation:'ROH-zuh-MAH-ling', ipa:'/ˈroʊzəˌmɑːlɪŋ/', pos:'noun', def:'A traditional Norwegian form of decorative folk painting featuring stylized flowers, scrollwork, and nature motifs in vibrant colors.', lang:'Norwegian, from rosemaling (\'rose painting\'), from rose (\'a rose\') + maling (\'painting\'), the folk art of rural Norway.', example:'The antique trunk was covered in rosemaling, the flowing Norwegian folk art of painted roses and scrollwork as vivid as the day it was brushed on.', isNoun:true },
  { word:'roseola', pronunciation:'roh-ZEE-oh-luh', ipa:'/roʊˈziːoʊlə/', pos:'noun', def:'A mild viral illness common in young children, characterized by a sudden high fever followed by a distinctive pink rash.', lang:'Latin, from roseola (\'a little rose\'), diminutive of roseus (\'rosy\'), describing the rose-colored rash.', example:'The pediatrician reassured the parents that the baby\'s roseola was harmless, the pink rash appearing only after the fever had already broken.', isNoun:true },
  { word:'rouille', pronunciation:'roo-EE', ipa:'/ruːˈiː/', pos:'noun', def:'A Provencal sauce made from garlic, saffron, chili peppers, and olive oil, traditionally served with bouillabaisse and fish soup.', lang:'French, from rouille (\'rust\'), from Latin rubigo, named for the sauce\'s distinctive rusty orange-red color.', example:'The bouillabaisse arrived with a bowl of fiery rouille on the side, the rust-colored Provencal sauce adding heat and depth to the fragrant fish stew.', isNoun:true },
  { word:'rubaiyat', pronunciation:'ROO-by-YAHT', ipa:'/ˌruːbaɪˈjɑːt/', pos:'noun', def:'A collection of quatrains (four-line verses), especially the famous Rubaiyat of Omar Khayyam as translated by Edward FitzGerald.', lang:'Arabic, from rubaiyat, plural of rubai (\'a quatrain\'), from arba (\'four\'), describing poems written in four-line stanzas.', example:'FitzGerald\'s Rubaiyat transformed Omar Khayyam\'s Persian quatrains into some of the most quoted poetry in the English language.', isNoun:true },
  { word:'rubefacient', pronunciation:'ROO-buh-FAY-shunt', ipa:'/ˌruːbɪˈfeɪʃənt/', pos:'noun', def:'A substance that causes redness of the skin by increasing blood flow, used in medicines and ointments for pain relief.', lang:'Latin, from rubefaciens (\'making red\'), from rubere (\'to be red\') + facere (\'to make\').', example:'The pharmacist recommended a rubefacient cream for the sore muscles, the warming ointment bringing blood to the surface and turning the skin a healthy pink.', isNoun:true },
  { word:'ruelle', pronunciation:'roo-EL', ipa:'/ruːˈɛl/', pos:'noun', def:'A narrow lane or alley; in 17th-century France, the space between a bed and the wall where a lady of fashion received guests.', lang:'French, from ruelle (\'a small street, a narrow space\'), diminutive of rue (\'a street\'), from Latin ruga.', example:'The Parisian hostess received her literary admirers in the ruelle, the intimate space beside her bed where the greatest minds of the age gathered.', isNoun:true },
  { word:'runcible spoon', pronunciation:'RUN-sih-bul SPOON', ipa:'/ˈrʌnsɪbəl ˌspuːn/', pos:'noun', def:'A utensil combining features of a fork, spoon, and knife, famously mentioned in Edward Lear\'s poem "The Owl and the Pussycat."', lang:'English, coined by Edward Lear in 1871, a nonsense word that later became associated with a real utensil resembling a spork with a cutting edge.', example:'They dined on mince and slices of quince, which they ate with a runcible spoon — Lear\'s whimsical invention now a beloved word in English.', isNoun:true },
  { word:'rupicolous', pronunciation:'roo-PIK-oh-lus', ipa:'/ruːˈpɪkələs/', pos:'adjective', def:'Living or growing on or among rocks; rock-dwelling.', lang:'Latin, from rupes (\'a rock, cliff\') + colere (\'to inhabit\'), + -ous.', example:'The rupicolous ferns clung to the sheer cliff face, their roots finding purchase in the tiniest cracks in the limestone.', isNoun:false },
  { word:'ruscus', pronunciation:'RUS-kus', ipa:'/ˈrʌskəs/', pos:'noun', def:'A genus of evergreen shrubs known as butcher\'s broom, with stiff, spine-tipped leaf-like stems and bright red berries.', lang:'Latin, from ruscus (\'butcher\'s broom\'), the spiny evergreen plant once used by butchers to clean their chopping blocks.', example:'The florist added branches of ruscus to the arrangement, the glossy dark green leaves and red berries providing structure and festive color.', isNoun:true },
  { word:'rutabaga', pronunciation:'ROO-tuh-BAY-guh', ipa:'/ˌruːtəˈbeɪɡə/', pos:'noun', def:'A large yellowish root vegetable of the cabbage family, also called swede, used in soups, stews, and as a roasted side dish.', lang:'Swedish dialect, from rotabagge (\'a ram\'s root\'), from rot (\'a root\') + bagge (\'a ram, lump\'), the hardy root vegetable.', example:'The rutabaga was roasted until golden and caramelized, its sweet, earthy flavor a perfect complement to the rosemary and brown butter.', isNoun:true },
  { word:'ryas', pronunciation:'REE-uhz', ipa:'/ˈriːəz/', pos:'noun', def:'Plural of rya; Scandinavian handwoven rugs with a deep, plush pile, traditionally used as bed covers and decorative wall hangings.', lang:'Swedish, from rya (\'a type of rug\'), from Old Norse ry (\'a rough coverlet\'), the shaggy wool rugs of Nordic tradition.', example:'The collection of vintage ryas hung on the gallery walls, each Scandinavian rug a bold composition of color and texture from the mid-20th century.', isNoun:true },
  { word:'Ryeland', pronunciation:'RY-lund', ipa:'/ˈraɪlənd/', pos:'noun', def:'A breed of sheep originating in Herefordshire, England, known for producing exceptionally fine, soft wool.', lang:'Named after the Ryeland area of Herefordshire, where rye was grown to feed these sheep, producing famously fine fleece.', example:'The Ryeland sheep grazed on the English hillside, their soft, dense fleece prized by hand-spinners for producing some of the finest wool in Britain.', isNoun:true },
  { word:'Ryukyu', pronunciation:'ree-OO-kyoo', ipa:'/riˈuːkjuː/', pos:'noun', def:'A chain of Japanese islands stretching from Kyushu to Taiwan, including Okinawa, with a distinct culture and history as an independent kingdom.', lang:'Japanese, from Ryukyu, possibly from Chinese Liuqiu (\'glazed dragon\'), the archipelago that was once an independent kingdom before Japanese annexation.', example:'The Ryukyu Islands preserve a distinct cultural identity, their traditional music, dance, and cuisine reflecting centuries as an independent maritime kingdom.', isNoun:true }
];

let currentIndex = 0, flipped = false, markedWords = new Set(), markedOnly = false;
let imageCache = {};
let imageLoading = {};
let touchStartX = 0, swipeX = 0;

const wikiImageMap = {
  'raclette': 'Raclette',
  'rafflesia': 'Rafflesia',
  'railleur': 'Raillery',
  'rajpramukh': 'Rajpramukh',
  'rapparee': 'Rapparee',
  'rapprochement': 'Rapprochement',
  'Rastafarian': 'Rastafari',
  'Rayleigh wave': 'Rayleigh_wave',
  'realpolitik': 'Realpolitik',
  'recamier': 'Récamier_(furniture)',
  'redingote': 'Redingote',
  'rembrandt': 'Rembrandt',
  'rennet': 'Rennet',
  'renvoi': 'Renvoi',
  'reveille': 'Reveille',
  'rhododendron': 'Rhododendron',
  'rhyton': 'Rhyton',
  'rinceau': 'Rinceau',
  'risorgimento': 'Italian_unification',
  'risposta': 'Riposte',
  'rissole': 'Rissole',
  'Robigalia': 'Robigalia',
  'rocaille': 'Rocaille',
  'roi faineant': 'Roi_fainéant',
  'rond de jambe': 'Rond_de_jambe',
  'rondeau': 'Rondeau_(poetry)',
  'rooseveltite': 'Rooseveltite',
  'rosemaling': 'Rosemaling',
  'roseola': 'Roseola',
  'rouille': 'Rouille',
  'rubaiyat': 'Rubaiyat_of_Omar_Khayyam',
  'rubefacient': 'Rubefacient',
  'ruelle': 'Ruelle',
  'runcible spoon': 'Runcible_spoon',
  'ruscus': 'Ruscus',
  'rutabaga': 'Rutabaga',
  'ryas': 'Rya',
  'Ryeland': 'Ryeland_sheep',
  'Ryukyu': 'Ryukyu_Islands'
};

async function loadImages() {
  for (const [word, article] of Object.entries(wikiImageMap)) {
    try {
      const resp = await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(article));
      if (resp.ok) {
        const data = await resp.json();
        if (data.thumbnail && data.thumbnail.source) {
          let url = data.thumbnail.source;
          url = url.replace(/\/\d+px-/, '/400px-');
          imageCache[word] = url;
          const imgEl = document.getElementById('img-' + word);
          if (imgEl) {
            imgEl.innerHTML = '<div class="image-box"><img class="word-img" src="' + url + '" alt="' + word + '" onerror="this.parentElement.style.display=\'none\'"><div class="img-caption">' + word + '</div></div>';
          }
        }
      }
    } catch(e) {}
  }
}

loadImages();

function aw() { return markedOnly ? WORDS.filter((_,i) => markedWords.has(i)) : WORDS; }
function si() { const a=aw(); if(markedOnly){const i=a.findIndex(w=>w.word===WORDS[currentIndex]?.word);return i>=0?i:0;} return currentIndex; }
function gi() { const a=aw(),s=si(); return WORDS.findIndex(w=>w.word===a[s]?.word); }

function speak(t) { speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.rate=0.85;u.pitch=1;u.lang="en-US"; speechSynthesis.speak(u); }

const starSvg=f=>`<svg viewBox="0 0 24 24" fill="${f?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
const speakerSvg=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;

function renderFront(w) {
  return `
    <div class="sect fade-in"><div class="tag">PRONUNCIATION</div><div class="pron-main">${w.pronunciation}</div><div class="ipa">${w.ipa}</div>
      <button class="listen-btn" onclick="event.stopPropagation();speak('${w.word}')">${speakerSvg}<span>Listen</span></button></div>
    <div class="sect fade-in" style="animation-delay:.06s"><div class="tag">PART OF SPEECH</div><span class="pos-chip">${w.pos}</span></div>
    <div class="sect fade-in" style="animation-delay:.12s"><div class="tag">DEFINITION</div><div class="def-text">${w.def}</div></div>
    <div class="sect fade-in" style="animation-delay:.18s"><div class="tag">LANGUAGE OF ORIGIN</div><div class="origin-text">${w.lang}</div></div>
    <div class="sect fade-in" style="animation-delay:.24s"><div class="tag">EXAMPLE</div><div class="ex-text">"${w.example.replace(new RegExp(w.word,'gi'),'________')}"</div></div>
    <div class="tap-hint fade-in" style="animation-delay:.3s">Tap card to reveal spelling</div>`;
}

function renderBack(w) {
  const letters=w.word.split("").map((c,i)=>`<span class="letter-tile" style="animation-delay:${i*0.04+0.12}s">${c}</span>`).join("");
  let img="";
  if(w.isNoun){
    let imgContent = "";
    if(imageCache[w.word]) imgContent=`<div class="image-box"><img class="word-img" src="${imageCache[w.word]}" alt="${w.word}" onerror="this.parentElement.style.display='none'"><div class="img-caption">${w.word}</div></div>`;
    else if(wikiImageMap[w.word]) imgContent=`<div class="loading-box"><div class="spinner"></div><span class="loading-text">Loading image…</span></div>`;
    img=`<div id="img-${w.word}">${imgContent}</div>`;
  }
  return `<div class="back-content">
    <div class="spelling-box" style="animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both">
      <div class="spelling-label">THE WORD IS</div><h2 class="spelling-word">${w.word}</h2>
      <div class="letters-row">${letters}</div>
      <button class="listen-btn" style="margin:14px auto 0" onclick="event.stopPropagation();speak('${w.word}')">${speakerSvg}<span>Hear Again</span></button>
    </div>${img}
    <div class="tap-hint">Tap card to go back to clues</div></div>`;
}

function render() {
  const a=aw();
  if(!a.length){ document.getElementById("card").innerHTML=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px"><p style="color:rgba(255,255,255,0.5);font-size:16px">No marked words yet.</p><button class="flip-btn" style="width:auto;padding:10px 24px" onclick="markedOnly=false;render()">← Show All</button></div>`; return; }
  const s=si(), g=gi(), w=a[s];

  document.getElementById("card").innerHTML=`<div class="card-top"><span class="counter">${s+1} / ${a.length}</span><div class="card-top-right"><span class="side-label">${flipped?'ANSWER':'CLUES'}</span><button class="mark-btn ${markedWords.has(g)?'active':''}" onclick="toggleMark(${g})">${starSvg(markedWords.has(g))}</button></div></div>`+(flipped?renderBack(w):renderFront(w));

  // Images loaded in background via loadImages()

  // Slider
  const totalA = a.length;
  const pct = totalA > 1 ? s / (totalA - 1) * 100 : 0;
  document.getElementById("sliderFill").style.width = pct + "%";
  const sliderArea = document.getElementById("sliderArea");
  const areaW = sliderArea.offsetWidth || 200;
  const pad = 10;
  const thumbLeft = pad + (pct / 100) * (areaW - pad * 2);
  const thumb = document.getElementById("sliderThumb");
  if(!thumb.classList.contains('dragging')) thumb.style.left = thumbLeft + "px";

  // Ticks - show ~20 evenly spaced markers
  const tickCount = Math.min(totalA, 20);
  let ticksHtml = '';
  for(let t=0; t<tickCount; t++){
    const ti = Math.round(t / (tickCount-1) * (totalA-1));
    const cls = ti===s ? 'active' : (t % 5 === 0 ? 'major' : '');
    ticksHtml += `<div class="slider-tick ${cls}"></div>`;
  }
  document.getElementById("sliderDots").innerHTML = ticksHtml;
  document.getElementById("sliderCounter").textContent = `${s+1} / ${totalA}`;

  // Mode btn
  const mb=document.getElementById("modeBtn");
  mb.className="mode-btn"+(markedOnly?" active":"");
  mb.querySelector("svg").setAttribute("fill",markedOnly?"currentColor":"none");
  document.getElementById("modeBtnText").textContent=(markedOnly?"Marked":"All")+` (${markedOnly?markedWords.size:WORDS.length})`;
}

function jumpTo(idx) {
  const a=aw(); if(idx<0||idx>=a.length) return;
  const g=WORDS.findIndex(w=>w.word===a[idx].word);
  flipped=false; currentIndex=g; render();
  setTimeout(()=>speak(a[idx].word),200);
}

function navigateTo(dir) {
  const a=aw(); if(!a.length) return;
  const s=si(), card=document.getElementById("card");
  card.classList.add(dir==="left"?"slide-out-l":"slide-out-r");
  flipped=false;
  setTimeout(()=>{
    card.classList.remove("slide-out-l","slide-out-r");
    const ni=dir==="left"?(s+1)%a.length:(s-1+a.length)%a.length;
    currentIndex=WORDS.findIndex(w=>w.word===a[ni].word);
    render(); setTimeout(()=>speak(a[ni].word),150);
  },220);
}

function flipCard(){flipped=!flipped;render();}
function toggleMark(g){markedWords.has(g)?markedWords.delete(g):markedWords.add(g);render();}
function toggleMarkedOnly(){if(!markedOnly&&markedWords.size===0)return;markedOnly=!markedOnly;flipped=false;render();}

// Swipe
const ca=document.getElementById("cardArea");
let swiped=false;
ca.addEventListener("touchstart",e=>{touchStartX=e.touches[0].clientX;swiped=false;},{passive:true});
ca.addEventListener("touchmove",e=>{swipeX=e.touches[0].clientX-touchStartX;if(Math.abs(swipeX)>15)swiped=true;},{passive:true});
ca.addEventListener("touchend",()=>{if(Math.abs(swipeX)>50)navigateTo(swipeX<0?"left":"right");swipeX=0;});

// Card tap to flip
const card=document.getElementById("card");
card.addEventListener("click",e=>{
  if(e.target.closest('button')||swiped) return;
  flipCard();
});

// Slider drag
const slArea=document.getElementById("sliderArea");
const slThumb=document.getElementById("sliderThumb");
let slDragging=false;
function sliderFromX(cx){
  const r=slArea.getBoundingClientRect();
  const pad=10;
  const p=Math.max(0,Math.min(1,(cx-r.left-pad)/(r.width-pad*2)));
  const a=aw(),idx=Math.round(p*(a.length-1));
  // Move thumb immediately for smooth feel
  const thumbLeft=pad+(p)*(r.width-pad*2);
  slThumb.style.left=thumbLeft+"px";
  if(idx!==si()){
    const g=WORDS.findIndex(w=>w.word===a[idx].word);
    flipped=false; currentIndex=g; render();
  }
}
slArea.addEventListener("touchstart",e=>{
  slDragging=true; slThumb.classList.add('dragging');
  sliderFromX(e.touches[0].clientX);
},{passive:true});
document.addEventListener("touchmove",e=>{
  if(slDragging) sliderFromX(e.touches[0].clientX);
},{passive:true});
document.addEventListener("touchend",()=>{
  if(slDragging){
    slDragging=false; slThumb.classList.remove('dragging');
    // Speak the word after releasing
    const a=aw(),s=si();
    if(a[s]) setTimeout(()=>speak(a[s].word),100);
  }
});
slArea.addEventListener("mousedown",e=>{
  slDragging=true; slThumb.classList.add('dragging');
  sliderFromX(e.clientX); e.preventDefault();
});
document.addEventListener("mousemove",e=>{
  if(slDragging) sliderFromX(e.clientX);
});
document.addEventListener("mouseup",()=>{
  if(slDragging){
    slDragging=false; slThumb.classList.remove('dragging');
    const a=aw(),s=si();
    if(a[s]) setTimeout(()=>speak(a[s].word),100);
  }
});

// Keyboard
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight")navigateTo("left");
  else if(e.key==="ArrowLeft")navigateTo("right");
  else if(e.key===" "){e.preventDefault();flipCard();}
});

render();
setTimeout(()=>speak(WORDS[0].word),500);
</script>
</body>
</html>
