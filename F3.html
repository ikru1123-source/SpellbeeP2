<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Spelling Bee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #d4af37;
  --gold-dim: rgba(212,175,55,0.5);
  --gold-glow: rgba(212,175,55,0.15);
  --bg: #0c0a13;
  --card: rgba(30,26,46,0.97);
  --text: #f0ece2;
  --text-dim: rgba(255,255,255,0.55);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif;
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
}
body {
  display: flex; flex-direction: column;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
  background: linear-gradient(170deg, #0c0a13 0%, #1a1528 45%, #110e1c 100%);
}

/* Header */
.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px 6px; flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 9px; }
.header-left span { font-size: 22px; }
.header-left h1 {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 700; letter-spacing: 0.02em;
}
.mode-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 13px; border-radius: 20px;
  border: 1.5px solid rgba(255,255,255,0.18);
  background: transparent; color: var(--text-dim);
  font-size: 12px; font-weight: 500; cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: all 0.25s;
}
.mode-btn.active {
  background: var(--gold-glow); border-color: var(--gold); color: var(--gold);
}
.mode-btn svg { width: 14px; height: 14px; }

/* Card */
.card-area {
  flex: 1; display: flex; flex-direction: column;
  padding: 6px 10px 0; overflow: hidden;
}
.card {
  flex: 1; display: flex; flex-direction: column;
  background: linear-gradient(150deg, rgba(38,32,56,0.97), rgba(22,18,36,0.99));
  border-radius: 22px;
  border: 1px solid rgba(212,175,55,0.1);
  padding: 16px 16px 14px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  transition: transform 0.08s ease;
}
.card::-webkit-scrollbar { display: none; }
.card-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px; flex-shrink: 0;
}
.counter { font-size: 11px; color: rgba(255,255,255,0.3); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
.side-label { font-size: 9px; font-weight: 700; letter-spacing: 0.16em; color: var(--gold-dim); text-transform: uppercase; }
.card-top-right { display: flex; align-items: center; gap: 10px; }
.mark-btn {
  background: none; border: none; cursor: pointer; padding: 2px;
  color: rgba(255,255,255,0.25); transition: all 0.2s;
}
.mark-btn.active { color: var(--gold); }
.mark-btn svg { width: 22px; height: 22px; }

/* Sections */
.sect { display: flex; flex-direction: column; gap: 3px; margin-bottom: 11px; }
.tag {
  font-size: 9px; font-weight: 700; letter-spacing: 0.16em;
  color: var(--gold); text-transform: uppercase; opacity: 0.75; margin-bottom: 1px;
}
.pron-main {
  font-family: 'Playfair Display', serif;
  font-size: 21px; font-weight: 700; letter-spacing: 0.05em;
}
.ipa { font-size: 13px; color: rgba(255,255,255,0.38); font-family: monospace; }
.listen-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 14px; border-radius: 20px;
  border: 1px solid rgba(212,175,55,0.3); background: rgba(212,175,55,0.08);
  color: var(--gold); cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-size: 12.5px; font-weight: 500; margin-top: 5px; align-self: flex-start;
  transition: all 0.2s;
}
.listen-btn:active { background: rgba(212,175,55,0.2); }
.listen-btn svg { width: 15px; height: 15px; }
.pos-chip {
  display: inline-block; padding: 3px 12px; border-radius: 14px;
  background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.22);
  color: var(--gold); font-size: 13px; font-weight: 600; font-style: italic;
}
.def-text { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.85); }
.origin-text { font-size: 13px; line-height: 1.55; color: var(--text-dim); font-style: italic; }
.ex-text {
  font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.65);
  border-left: 3px solid rgba(212,175,55,0.35); padding-left: 12px; font-style: italic;
}

/* Tap hint */
.tap-hint {
  text-align: center; padding: 12px 0 4px;
  font-size: 12px; color: rgba(255,255,255,0.2);
  letter-spacing: 0.04em; flex-shrink: 0;
}

/* Back */
.back-content { display: flex; flex-direction: column; align-items: center; gap: 20px; padding-top: 6px; flex: 1; }
.spelling-box {
  text-align: center; width: 100%; padding: 22px 12px 18px;
  background: linear-gradient(135deg, rgba(212,175,55,0.07), rgba(212,175,55,0.02));
  border-radius: 16px; border: 1px solid rgba(212,175,55,0.15);
}
.spelling-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.22em;
  color: rgba(212,175,55,0.6); text-transform: uppercase; margin-bottom: 10px;
}
.spelling-word {
  font-family: Verdana, Geneva, sans-serif; font-size: 36px; font-weight: 400;
  letter-spacing: 0.04em; line-height: 1.15;
  text-shadow: 0 2px 16px rgba(212,175,55,0.2); margin-bottom: 14px;
}
.letters-row { display: flex; justify-content: center; gap: 3px; flex-wrap: wrap; }
.letter-tile {
  display: inline-flex; align-items: center; justify-content: center;
  width: 27px; height: 34px; border-radius: 6px;
  background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.2);
  color: var(--gold); font-family: 'Playfair Display', serif;
  font-size: 17px; font-weight: 700;
  animation: letterPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
}
.image-box {
  width: 100%; border-radius: 14px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08); position: relative;
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  animation-delay: 0.15s;
}
.word-img { width: 100%; height: 190px; object-fit: cover; display: block; }
.img-caption {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 20px 14px 8px;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7);
  letter-spacing: 0.06em; text-transform: capitalize;
}
.loading-box { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 20px 0; }
.spinner {
  width: 22px; height: 22px;
  border: 2.5px solid rgba(212,175,55,0.2);
  border-top-color: var(--gold); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-text { color: rgba(255,255,255,0.35); font-size: 12px; }

/* Bottom bar */
.bottom-bar {
  flex-shrink: 0;
  padding: 10px 16px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.nav-row {
  display: flex; align-items: center; justify-content: center; gap: 12px;
}
.nav-arrow {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.5); cursor: pointer;
  transition: all 0.2s; flex-shrink: 0;
}
.nav-arrow:active { background: rgba(212,175,55,0.15); border-color: var(--gold); color: var(--gold); transform: scale(0.92); }
.nav-arrow svg { width: 18px; height: 18px; }
.slider-area {
  flex: 1; height: 32px; position: relative;
  display: flex; align-items: center;
  touch-action: none; cursor: pointer;
}
.slider-track-bg {
  width: 100%; height: 3px; border-radius: 2px;
  background: rgba(255,255,255,0.08); position: relative; overflow: hidden;
}
.slider-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--gold), rgba(212,175,55,0.5));
  transition: width 0.15s ease;
}
.slider-dots {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: space-between;
  pointer-events: none; padding: 0 2px;
}
.slider-tick {
  width: 2px; height: 8px; border-radius: 1px;
  background: rgba(255,255,255,0.06); flex-shrink: 0;
}
.slider-tick.major { height: 12px; background: rgba(255,255,255,0.12); }
.slider-tick.active { background: var(--gold); height: 14px; width: 3px; border-radius: 1.5px; box-shadow: 0 0 6px rgba(212,175,55,0.4); }
.slider-thumb {
  position: absolute; top: 50%; transform: translate(-50%, -50%);
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--gold);
  border: 2.5px solid #1a1528;
  box-shadow: 0 0 10px rgba(212,175,55,0.5), 0 2px 6px rgba(0,0,0,0.4);
  cursor: grab; transition: left 0.12s ease;
  z-index: 2;
}
.slider-thumb:active { cursor: grabbing; transform: translate(-50%, -50%) scale(1.15); }
.slider-thumb.dragging { transition: none; transform: translate(-50%, -50%) scale(1.15); }
.slider-counter {
  text-align: center; font-size: 11px; font-weight: 600;
  color: rgba(255,255,255,0.25); letter-spacing: 0.08em;
}

/* Animations */
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes popIn { 0% { transform: scale(0.92); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
@keyframes letterPop { 0% { transform: scale(0) rotate(-8deg); opacity: 0; } 60% { transform: scale(1.1) rotate(2deg); opacity: 1; } 100% { transform: scale(1) rotate(0); opacity: 1; } }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes slideOutL { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-105%); opacity: 0; } }
@keyframes slideOutR { from { transform: translateX(0); opacity: 1; } to { transform: translateX(105%); opacity: 0; } }
.slide-out-l { animation: slideOutL 0.22s ease forwards; }
.slide-out-r { animation: slideOutR 0.22s ease forwards; }
.fade-in { animation: fadeUp 0.3s ease both; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span>🐝</span>
    <h1><a href="index.html" style="color:inherit;text-decoration:none;">Spelling Bee</a></h1>
  </div>
  <button class="mode-btn" id="modeBtn" onclick="toggleMarkedOnly()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span id="modeBtnText">All (6)</span>
  </button>
</div>

<div class="card-area" id="cardArea">
  <div class="card" id="card"></div>
</div>

<div class="bottom-bar">
  <div class="nav-row">
    <button class="nav-arrow" id="prevBtn" onclick="navigateTo('right')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="slider-area" id="sliderArea">
      <div class="slider-track-bg">
        <div class="slider-fill" id="sliderFill"></div>
      </div>
      <div class="slider-dots" id="sliderDots"></div>
      <div class="slider-thumb" id="sliderThumb"></div>
    </div>
    <button class="nav-arrow" id="nextBtn" onclick="navigateTo('left')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
  </div>
  <div class="slider-counter" id="sliderCounter">1 / 208</div>
</div>

<script>
const WORDS = [
  { word:'faipule', pronunciation:'FY-poo-lay', ipa:'/ˈfaɪpuːleɪ/', pos:'noun', def:'A village chief or council member in Samoan society; a local leader responsible for governance within a traditional village.', lang:'Samoan, from faipule (\'a counselor, chief\'), from fai (\'to do, make\') + pule (\'authority, power\').', example:'The faipule convened the village council under the great banyan tree to discuss the allocation of communal fishing grounds.', isNoun:true },
  { word:'farfalle', pronunciation:'far-FAL-ay', ipa:'/fɑːrˈfæleɪ/', pos:'noun', def:'Bow-tie or butterfly-shaped pasta, popular in Italian cuisine for holding chunky sauces and vegetables.', lang:'Italian, from farfalle (\'butterflies\'), plural of farfalla (\'a butterfly\'), from Latin papilio.', example:'The farfalle was tossed with roasted cherry tomatoes, fresh basil, and crumbled ricotta, the bow-tie pasta catching sauce in every fold.', isNoun:true },
  { word:'farouche', pronunciation:'fah-ROOSH', ipa:'/fɑːˈruːʃ/', pos:'adjective', def:'Sullen or shy in company; unsociable and wild; having an untamed, fierce quality.', lang:'French, from farouche (\'wild, fierce\'), from Old French faroche, from Latin forasticus (\'belonging outside\'), from foras (\'out of doors\').', example:'The farouche teenager sat alone at every party, her fierce shyness mistaken for hostility by classmates who didn\'t know her.', isNoun:false },
  { word:'farrago', pronunciation:'fuh-RAH-goh', ipa:'/fəˈrɑːɡoʊ/', pos:'noun', def:'A confused mixture; a hodgepodge or medley of disparate things.', lang:'Latin, from farrago (\'mixed fodder, mash\'), from far (\'grain, spelt\'), originally cattle feed made from mixed grains.', example:'The conspiracy theory was a farrago of half-truths, misquotations, and wild speculation that fell apart under the slightest scrutiny.', isNoun:true },
  { word:'Fatimid', pronunciation:'FAT-ih-mid', ipa:'/ˈfætɪmɪd/', pos:'noun', def:'A member of the Islamic dynasty that ruled North Africa and the Middle East from 909 to 1171, claiming descent from Fatimah, daughter of the Prophet Muhammad.', lang:'Arabic, from Fatima (\'the shining one\'), the daughter of the Prophet Muhammad and wife of Ali, from whom the dynasty claimed lineage, + -id.', example:'The Fatimid caliphs founded the city of Cairo and established Al-Azhar, which became one of the world\'s oldest and most prestigious universities.', isNoun:true },
  { word:'fatshedera', pronunciation:'fat-SHED-ur-uh', ipa:'/fætˈʃɛdərə/', pos:'noun', def:'A hybrid ornamental plant, a cross between English ivy and Japanese aralia, popular as a houseplant for its large, glossy leaves.', lang:'Latin, a portmanteau of Fatsia (Japanese aralia) + Hedera (ivy), the two parent genera combined to create this intergeneric hybrid.', example:'The fatshedera thrived in the shady corner of the office, its large glossy leaves combining the best features of both ivy and aralia.', isNoun:true },
  { word:'fauchard', pronunciation:'foh-SHARD', ipa:'/foʊˈʃɑːrd/', pos:'noun', def:'A medieval polearm with a broad, curved blade on a long shaft, used by infantry, resembling a cross between a scythe and a glaive.', lang:'French, from fauchard (\'a sickle-like weapon\'), from faux (\'a scythe\'), from Latin falx (\'a sickle\').', example:'The foot soldier swung his fauchard in a wide arc, the heavy curved blade on its long pole keeping mounted knights at a deadly distance.', isNoun:true },
  { word:'fauxbourdon', pronunciation:'FOH-boor-don', ipa:'/ˌfoʊbʊərˈdɒn/', pos:'noun', def:'A musical technique of the 15th century in which a melody is harmonized with parallel intervals, creating a rich choral texture.', lang:'French, from faux (\'false\') + bourdon (\'a drone, bass note\'), possibly because the technique created a \'false\' bass line moving in parallel.', example:'The Renaissance choir sang in fauxbourdon, the parallel harmonies creating an ethereal, shimmering wall of sound in the stone chapel.', isNoun:true },
  { word:'Feldenkrais', pronunciation:'FEL-dun-krys', ipa:'/ˈfɛldənˌkraɪs/', pos:'noun', def:'A method of somatic education using gentle movement and directed attention to improve body awareness, flexibility, and ease of movement.', lang:'Named after Moshé Feldenkrais (1904-1984), the Ukrainian-Israeli physicist and judo practitioner who developed this movement method.', example:'The Feldenkrais practitioner guided her through slow, mindful movements, helping her discover new patterns of motion that relieved her chronic back pain.', isNoun:true },
  { word:'fellahin', pronunciation:'FEL-uh-HEEN', ipa:'/ˌfɛləˈhiːn/', pos:'noun', def:'Peasant farmers in Arab countries, especially Egypt; the agricultural working class of the Middle East and North Africa.', lang:'Arabic, from fellahin, plural of fellah (\'a peasant, tiller of the soil\'), from falaha (\'to plough, cultivate\').', example:'The fellahin worked the Nile Delta fields as their ancestors had for millennia, their lives still governed by the river\'s annual flood cycle.', isNoun:true },
  { word:'fellaheen', pronunciation:'FEL-uh-HEEN', ipa:'/ˌfɛləˈhiːn/', pos:'noun', def:'An alternate plural form of fellah; peasant farmers of the Arab world, particularly Egypt.', lang:'Arabic, variant plural of fellah (\'a peasant, ploughman\'), from falaha (\'to cultivate\').', example:'The fellaheen gathered at the village well at dawn, their donkeys laden with tools for another long day in the cotton fields.', isNoun:true },
  { word:'ferruginous', pronunciation:'feh-ROO-jih-nus', ipa:'/fɛˈruːdʒɪnəs/', pos:'adjective', def:'Containing iron or iron rust; reddish-brown in color like rust.', lang:'Latin, from ferruginosus (\'of the color of iron rust\'), from ferrugo (\'iron rust\'), from ferrum (\'iron\'), + -ous.', example:'The ferruginous cliffs glowed a deep rusty red in the late afternoon sun, their iron-rich rock staining the beach sand orange below.', isNoun:false },
  { word:'fête champêtre', pronunciation:'FET shahm-PET-ruh', ipa:'/ˌfɛt ʃɑ̃ˈpɛtrə/', pos:'noun', def:'An outdoor festival or garden party; a pastoral entertainment held in the open air, often depicted in 18th-century French painting.', lang:'French, from fête (\'a festival\') + champêtre (\'rural, of the countryside\'), from champ (\'a field\'), from Latin campus.', example:'The Watteau painting depicted an idyllic fête champêtre, elegantly dressed couples lounging and dancing in a sunlit park.', isNoun:true },
  { word:'fetticus', pronunciation:'FET-ih-kus', ipa:'/ˈfɛtɪkəs/', pos:'noun', def:'A small-leaved salad green also known as lamb\'s lettuce, mâche, or corn salad, with a mild, slightly nutty flavor.', lang:'German, from Feldsalat (\'field salad\'), adapted through Pennsylvania Dutch as fetticus, the regional American name for this delicate green.', example:'The winter salad featured tender fetticus leaves tossed with beets and walnuts, the mild green providing a delicate base for the vinaigrette.', isNoun:true },
  { word:'fibromyalgia', pronunciation:'FY-broh-my-AL-juh', ipa:'/ˌfaɪbroʊmaɪˈældʒə/', pos:'noun', def:'A chronic condition characterized by widespread musculoskeletal pain, fatigue, and tenderness at specific points on the body.', lang:'Latin, from fibro- (from fibra, \'a fiber\') + Greek mys (\'muscle\') + algos (\'pain\'), literally \'fiber-muscle pain\'.', example:'The patient was diagnosed with fibromyalgia after months of unexplained widespread pain and exhaustion that no other tests could explain.', isNoun:true },
  { word:'fin de siècle', pronunciation:'FAN duh see-EK-luh', ipa:'/ˌfæ̃ də siˈɛklə/', pos:'adjective', def:'Of or relating to the end of the 19th century; characteristic of the decadence and sophistication associated with that era.', lang:'French, from fin (\'end\') + de (\'of\') + siècle (\'century\'), describing the cultural mood of the 1890s.', example:'The fin de siècle atmosphere of Vienna was electric with artistic innovation, from Klimt\'s golden paintings to Freud\'s revolutionary theories of the mind.', isNoun:false },
  { word:'Firbolg', pronunciation:'FIR-bolg', ipa:'/ˈfɪrbɒlɡ/', pos:'noun', def:'In Irish mythology, a race of people who inhabited Ireland before the arrival of the Tuatha Dé Danann; one of the legendary early settlers of Ireland.', lang:'Old Irish, from Fir Bolg (\'men of bags\'), possibly meaning \'men of the leather bags\' or related to the Belgae, a Celtic tribe.', example:'The Firbolg ruled Ireland until they were defeated by the Tuatha Dé Danann at the First Battle of Moytura, according to ancient Irish legend.', isNoun:true },
  { word:'flehmen', pronunciation:'FLAY-mun', ipa:'/ˈfleɪmən/', pos:'noun', def:'A behavior in which an animal curls back its upper lip to expose the front teeth and inhale, drawing scent into a specialized organ for analysis.', lang:'German, from flehmen (\'to bare the upper teeth\'), describing the characteristic lip-curling grimace used by horses, cats, and other mammals.', example:'The stallion raised his head and performed the flehmen response, curling his lip to better detect the pheromones carried on the breeze.', isNoun:true },
  { word:'force majeure', pronunciation:'FORS mah-ZHUR', ipa:'/ˌfɔːrs mɑːˈʒɜːr/', pos:'noun', def:'Unforeseeable circumstances that prevent someone from fulfilling a contract; a superior or irresistible force; an act of God.', lang:'French, from force (\'force, strength\') + majeure (\'greater, superior\'), from Latin major.', example:'The company invoked the force majeure clause in the contract after the earthquake made it impossible to deliver the goods on schedule.', isNoun:true },
  { word:'Formica', pronunciation:'for-MY-kuh', ipa:'/fɔːrˈmaɪkə/', pos:'noun', def:'A brand of durable laminated plastic used for countertops and surfaces; also the genus name for a large group of ants.', lang:'As a brand: coined in 1913, meaning \'for mica\' (as a substitute for mica insulation). As ant genus: Latin, from formica (\'an ant\').', example:'The 1950s diner was a time capsule of Formica countertops and chrome stools, every surface gleaming with midcentury optimism.', isNoun:true },
  { word:'frabjous', pronunciation:'FRAB-jus', ipa:'/ˈfræbdʒəs/', pos:'adjective', def:'Delightful, joyous, and wonderful; a nonsense word coined by Lewis Carroll expressing supreme happiness.', lang:'English, invented by Lewis Carroll in Jabberwocky (1871), possibly a blend of fair, fabulous, and joyous.', example:'It was a frabjous day indeed when the acceptance letter arrived, the family erupting in cheers and spontaneous dancing around the kitchen.', isNoun:false },
  { word:'fracas', pronunciation:'FRAY-kus', ipa:'/ˈfreɪkəs/', pos:'noun', def:'A noisy disturbance or quarrel; a brawl or commotion.', lang:'French, from fracas (\'a crash, din\'), from Italian fracasso (\'a crash\'), from fracassare (\'to smash\'), of imitative origin.', example:'The fracas outside the pub spilled into the street, a tangle of shouting voices and overturned chairs that brought the police running.', isNoun:true },
  { word:'funori', pronunciation:'foo-NOR-ee', ipa:'/fuːˈnɔːri/', pos:'noun', def:'A seaweed-based adhesive used in Japanese art conservation and textile sizing, made from a type of red algae.', lang:'Japanese, from funori (\'a seaweed glue\'), from the species of red algae Gloiopeltis traditionally harvested and processed into paste.', example:'The conservator applied funori to the delicate Japanese scroll painting, the seaweed adhesive gentle enough to stabilize the ancient paper without damage.', isNoun:true },
  { word:'furan', pronunciation:'FYOOR-an', ipa:'/ˈfjʊəræn/', pos:'noun', def:'A colorless, volatile, toxic liquid with a cyclic structure, used as a starting material for various chemical syntheses.', lang:'Latin, from furfur (\'bran\'), + -an, because furan was first obtained from the distillation of bran or corn bran.', example:'The organic chemistry students synthesized furan derivatives in the lab, the five-membered aromatic ring serving as a versatile building block.', isNoun:true },
  { word:'Furneaux', pronunciation:'FUR-noh', ipa:'/ˈfɜːrnoʊ/', pos:'noun', def:'A group of islands in Bass Strait between Australia and Tasmania, including Flinders Island and Cape Barren Island.', lang:'Named after Tobias Furneaux (1735-1781), the English navigator who accompanied James Cook on his second voyage and charted these islands.', example:'The Furneaux Islands lie scattered across Bass Strait, their windswept shores home to colonies of seabirds and a small community of hardy residents.', isNoun:true },
  { word:'furuncle', pronunciation:'FYOOR-ung-kul', ipa:'/ˈfjʊərʌŋkəl/', pos:'noun', def:'A boil; a painful, pus-filled infection of a hair follicle caused by bacteria, forming a swollen red lump under the skin.', lang:'Latin, from furunculus (\'a petty thief, a boil\'), diminutive of fur (\'a thief\'), because the boil \'steals\' vitality from the body.', example:'The doctor lanced the painful furuncle on the patient\'s neck, draining the infected abscess and prescribing antibiotics to prevent recurrence.', isNoun:true }
];

let currentIndex = 0, flipped = false, markedWords = new Set(), markedOnly = false;
let imageCache = {}, imageLoading = {};
let touchStartX = 0, swipeX = 0;

function aw() { return markedOnly ? WORDS.filter((_,i) => markedWords.has(i)) : WORDS; }
function si() { const a=aw(); if(markedOnly){const i=a.findIndex(w=>w.word===WORDS[currentIndex]?.word);return i>=0?i:0;} return currentIndex; }
function gi() { const a=aw(),s=si(); return WORDS.findIndex(w=>w.word===a[s]?.word); }

function speak(t) { speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.rate=0.85;u.pitch=1;u.lang="en-US"; speechSynthesis.speak(u); }

async function fetchImage(word) {
  if(imageCache[word]||imageLoading[word]) return;
  imageLoading[word]=true;
  // Update just the image placeholder if it exists
  const imgPlaceholder = document.getElementById('img-'+word);
  if(imgPlaceholder) imgPlaceholder.innerHTML=`<div class="loading-box"><div class="spinner"></div><span class="loading-text">Finding image…</span></div>`;
  try {
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:'Search online and find a direct image URL for "'+word+'". Return ONLY the raw URL ending in .jpg/.jpeg/.png/.svg/.webp. No markdown, no explanation.'}],tools:[{type:"web_search_20250305",name:"web_search"}]})});
    const d=await r.json(); const t=d.content.map(b=>b.type==="text"?b.text:"").filter(Boolean).join("\n").trim();
    const m=t.match(/https?:\/\/[^\s"'<>\)]+\.(jpg|jpeg|png|svg|webp)([^\s"'<>\)]*)*/i);
    imageCache[word]=m?m[0]:null;
  } catch(e){imageCache[word]=null;}
  imageLoading[word]=false;
  // Update just the image placeholder if still on same word
  const imgEl = document.getElementById('img-'+word);
  if(imgEl && imageCache[word]) {
    imgEl.innerHTML=`<div class="image-box"><img class="word-img" src="${imageCache[word]}" alt="${word}" onerror="this.parentElement.style.display='none'"><div class="img-caption">${word}</div></div>`;
  } else if(imgEl) {
    imgEl.innerHTML='';
  }
}

const starSvg=f=>`<svg viewBox="0 0 24 24" fill="${f?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
const speakerSvg=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;

function renderFront(w) {
  return `
    <div class="sect fade-in"><div class="tag">PRONUNCIATION</div><div class="pron-main">${w.pronunciation}</div><div class="ipa">${w.ipa}</div>
      <button class="listen-btn" onclick="event.stopPropagation();speak('${w.word}')">${speakerSvg}<span>Listen</span></button></div>
    <div class="sect fade-in" style="animation-delay:.06s"><div class="tag">PART OF SPEECH</div><span class="pos-chip">${w.pos}</span></div>
    <div class="sect fade-in" style="animation-delay:.12s"><div class="tag">DEFINITION</div><div class="def-text">${w.def}</div></div>
    <div class="sect fade-in" style="animation-delay:.18s"><div class="tag">LANGUAGE OF ORIGIN</div><div class="origin-text">${w.lang}</div></div>
    <div class="sect fade-in" style="animation-delay:.24s"><div class="tag">EXAMPLE</div><div class="ex-text">"${w.example.replace(new RegExp(w.word,'gi'),'________')}"</div></div>
    <div class="tap-hint fade-in" style="animation-delay:.3s">Tap card to reveal spelling</div>`;
}

function renderBack(w) {
  const letters=w.word.split("").map((c,i)=>`<span class="letter-tile" style="animation-delay:${i*0.04+0.12}s">${c}</span>`).join("");
  let img="";
  if(w.isNoun){
    let imgContent = "";
    if(imageLoading[w.word]) imgContent=`<div class="loading-box"><div class="spinner"></div><span class="loading-text">Finding image…</span></div>`;
    else if(imageCache[w.word]) imgContent=`<div class="image-box"><img class="word-img" src="${imageCache[w.word]}" alt="${w.word}" onerror="this.parentElement.style.display='none'"><div class="img-caption">${w.word}</div></div>`;
    img=`<div id="img-${w.word}">${imgContent}</div>`;
  }
  return `<div class="back-content">
    <div class="spelling-box" style="animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both">
      <div class="spelling-label">THE WORD IS</div><h2 class="spelling-word">${w.word}</h2>
      <div class="letters-row">${letters}</div>
      <button class="listen-btn" style="margin:14px auto 0" onclick="event.stopPropagation();speak('${w.word}')">${speakerSvg}<span>Hear Again</span></button>
    </div>${img}
    <div class="tap-hint">Tap card to go back to clues</div></div>`;
}

function render() {
  const a=aw();
  if(!a.length){ document.getElementById("card").innerHTML=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px"><p style="color:rgba(255,255,255,0.5);font-size:16px">No marked words yet.</p><button class="flip-btn" style="width:auto;padding:10px 24px" onclick="markedOnly=false;render()">← Show All</button></div>`; return; }
  const s=si(), g=gi(), w=a[s];

  document.getElementById("card").innerHTML=`<div class="card-top"><span class="counter">${s+1} / ${a.length}</span><div class="card-top-right"><span class="side-label">${flipped?'ANSWER':'CLUES'}</span><button class="mark-btn ${markedWords.has(g)?'active':''}" onclick="toggleMark(${g})">${starSvg(markedWords.has(g))}</button></div></div>`+(flipped?renderBack(w):renderFront(w));

  if(flipped && w.isNoun&&!imageCache[w.word]&&!imageLoading[w.word]) fetchImage(w.word);

  // Slider
  const totalA = a.length;
  const pct = totalA > 1 ? s / (totalA - 1) * 100 : 0;
  document.getElementById("sliderFill").style.width = pct + "%";
  const sliderArea = document.getElementById("sliderArea");
  const areaW = sliderArea.offsetWidth || 200;
  const pad = 10;
  const thumbLeft = pad + (pct / 100) * (areaW - pad * 2);
  const thumb = document.getElementById("sliderThumb");
  if(!thumb.classList.contains('dragging')) thumb.style.left = thumbLeft + "px";

  // Ticks - show ~20 evenly spaced markers
  const tickCount = Math.min(totalA, 20);
  let ticksHtml = '';
  for(let t=0; t<tickCount; t++){
    const ti = Math.round(t / (tickCount-1) * (totalA-1));
    const cls = ti===s ? 'active' : (t % 5 === 0 ? 'major' : '');
    ticksHtml += `<div class="slider-tick ${cls}"></div>`;
  }
  document.getElementById("sliderDots").innerHTML = ticksHtml;
  document.getElementById("sliderCounter").textContent = `${s+1} / ${totalA}`;

  // Mode btn
  const mb=document.getElementById("modeBtn");
  mb.className="mode-btn"+(markedOnly?" active":"");
  mb.querySelector("svg").setAttribute("fill",markedOnly?"currentColor":"none");
  document.getElementById("modeBtnText").textContent=(markedOnly?"Marked":"All")+` (${markedOnly?markedWords.size:WORDS.length})`;
}

function jumpTo(idx) {
  const a=aw(); if(idx<0||idx>=a.length) return;
  const g=WORDS.findIndex(w=>w.word===a[idx].word);
  flipped=false; currentIndex=g; render();
  setTimeout(()=>speak(a[idx].word),200);
}

function navigateTo(dir) {
  const a=aw(); if(!a.length) return;
  const s=si(), card=document.getElementById("card");
  card.classList.add(dir==="left"?"slide-out-l":"slide-out-r");
  flipped=false;
  setTimeout(()=>{
    card.classList.remove("slide-out-l","slide-out-r");
    const ni=dir==="left"?(s+1)%a.length:(s-1+a.length)%a.length;
    currentIndex=WORDS.findIndex(w=>w.word===a[ni].word);
    render(); setTimeout(()=>speak(a[ni].word),150);
  },220);
}

function flipCard(){flipped=!flipped;render();}
function toggleMark(g){markedWords.has(g)?markedWords.delete(g):markedWords.add(g);render();}
function toggleMarkedOnly(){if(!markedOnly&&markedWords.size===0)return;markedOnly=!markedOnly;flipped=false;render();}

// Swipe
const ca=document.getElementById("cardArea");
let swiped=false;
ca.addEventListener("touchstart",e=>{touchStartX=e.touches[0].clientX;swiped=false;},{passive:true});
ca.addEventListener("touchmove",e=>{swipeX=e.touches[0].clientX-touchStartX;if(Math.abs(swipeX)>15)swiped=true;},{passive:true});
ca.addEventListener("touchend",()=>{if(Math.abs(swipeX)>50)navigateTo(swipeX<0?"left":"right");swipeX=0;});

// Card tap to flip
const card=document.getElementById("card");
card.addEventListener("click",e=>{
  if(e.target.closest('button')||swiped) return;
  flipCard();
});

// Slider drag
const slArea=document.getElementById("sliderArea");
const slThumb=document.getElementById("sliderThumb");
let slDragging=false;
function sliderFromX(cx){
  const r=slArea.getBoundingClientRect();
  const pad=10;
  const p=Math.max(0,Math.min(1,(cx-r.left-pad)/(r.width-pad*2)));
  const a=aw(),idx=Math.round(p*(a.length-1));
  // Move thumb immediately for smooth feel
  const thumbLeft=pad+(p)*(r.width-pad*2);
  slThumb.style.left=thumbLeft+"px";
  if(idx!==si()){
    const g=WORDS.findIndex(w=>w.word===a[idx].word);
    flipped=false; currentIndex=g; render();
  }
}
slArea.addEventListener("touchstart",e=>{
  slDragging=true; slThumb.classList.add('dragging');
  sliderFromX(e.touches[0].clientX);
},{passive:true});
document.addEventListener("touchmove",e=>{
  if(slDragging) sliderFromX(e.touches[0].clientX);
},{passive:true});
document.addEventListener("touchend",()=>{
  if(slDragging){
    slDragging=false; slThumb.classList.remove('dragging');
    // Speak the word after releasing
    const a=aw(),s=si();
    if(a[s]) setTimeout(()=>speak(a[s].word),100);
  }
});
slArea.addEventListener("mousedown",e=>{
  slDragging=true; slThumb.classList.add('dragging');
  sliderFromX(e.clientX); e.preventDefault();
});
document.addEventListener("mousemove",e=>{
  if(slDragging) sliderFromX(e.clientX);
});
document.addEventListener("mouseup",()=>{
  if(slDragging){
    slDragging=false; slThumb.classList.remove('dragging');
    const a=aw(),s=si();
    if(a[s]) setTimeout(()=>speak(a[s].word),100);
  }
});

// Keyboard
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight")navigateTo("left");
  else if(e.key==="ArrowLeft")navigateTo("right");
  else if(e.key===" "){e.preventDefault();flipCard();}
});

render();
setTimeout(()=>speak(WORDS[0].word),500);
</script>
</body>
</html>
